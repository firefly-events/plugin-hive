name: test-swarm
description: Generalized test swarm — 8-task pipeline from context through bug reporting.
version: "1.0.0"

steps:
  - id: gather-context
    agent: test-scout
    task: >
      Read the story spec, PR, or commit context. Cross-reference with baseline
      knowledge. Produce a structured context document covering what was built,
      affected areas, acceptance criteria, and test-relevant details.
    depends_on: []
    inputs:
      - name: story_spec
        source: context
        context_key: story_spec
      - name: baseline_path
        source: context
        context_key: baseline_path
    outputs:
      - name: context_doc
        type: string
    optional: false
    timeout_ms: 300000

  - id: verify-baseline
    agent: test-scout
    task: >
      Check if baseline knowledge exists for this project. If missing, run a
      discovery pass: inspect codebase structure, detect test frameworks, map
      navigation/routing, catalog key modules. If baseline exists, verify it's
      current and update if the codebase has significantly changed.
    depends_on:
      - gather-context
    inputs:
      - name: context_doc
        source: step_output
        step_id: gather-context
        output_name: context_doc
      - name: baseline_path
        source: context
        context_key: baseline_path
    outputs:
      - name: baseline_status
        type: string
    optional: false
    timeout_ms: 600000

  - id: author-tests
    agent: test-architect
    task: >
      Detect the project's test framework. Author test scripts for each
      acceptance criterion: happy paths, edge cases, error states. Map every
      test to its source requirement. Flag regression candidates. Output test
      files and a structured test manifest.
    depends_on:
      - verify-baseline
    inputs:
      - name: context_doc
        source: step_output
        step_id: gather-context
        output_name: context_doc
      - name: baseline_path
        source: context
        context_key: baseline_path
      - name: story_spec
        source: context
        context_key: story_spec
    outputs:
      - name: test_manifest
        type: string
      - name: test_files
        type: artifact_ref
    optional: false
    timeout_ms: 600000

  - id: validate-coverage
    agent: test-inspector
    task: >
      Validate that authored tests adequately cover the story's acceptance
      criteria. Map each requirement to its covering test(s). Identify gaps
      with specificity and severity classification. Produce a coverage report.
    depends_on:
      - verify-baseline
    inputs:
      - name: test_manifest
        source: step_output
        step_id: author-tests
        output_name: test_manifest
      - name: context_doc
        source: step_output
        step_id: gather-context
        output_name: context_doc
      - name: story_spec
        source: context
        context_key: story_spec
    outputs:
      - name: coverage_report
        type: string
    optional: false
    timeout_ms: 300000

  - id: execute-platform-a
    agent: test-worker
    task: >
      Execute authored tests on the primary platform. Detect connected
      devices/environments. Run each test, capturing pass/fail, timing,
      screenshots on failure, and logs. Compile structured results.
    depends_on:
      - author-tests
    inputs:
      - name: test_files
        source: step_output
        step_id: author-tests
        output_name: test_files
      - name: test_manifest
        source: step_output
        step_id: author-tests
        output_name: test_manifest
    outputs:
      - name: platform_a_results
        type: string
    optional: false
    timeout_ms: 600000

  - id: execute-platform-b
    agent: test-worker
    task: >
      Execute authored tests on the secondary platform (if configured).
      Same protocol as platform-a but targeting a different device/browser/environment.
      Skip if only one platform is configured.
    depends_on:
      - author-tests
    inputs:
      - name: test_files
        source: step_output
        step_id: author-tests
        output_name: test_files
      - name: test_manifest
        source: step_output
        step_id: author-tests
        output_name: test_manifest
    outputs:
      - name: platform_b_results
        type: string
    optional: true
    timeout_ms: 600000

  - id: file-bugs
    agent: test-sentinel
    task: >
      Process all test failures from both platforms. For each failure: gather
      expected vs actual, screenshots, repro steps. Generate AI hypothesis on
      root cause. Classify severity. Route based on severity and learned patterns.
      File bug reports for failures.
    depends_on:
      - execute-platform-a
      - execute-platform-b
    inputs:
      - name: platform_a_results
        source: step_output
        step_id: execute-platform-a
        output_name: platform_a_results
      - name: platform_b_results
        source: step_output
        step_id: execute-platform-b
        output_name: platform_b_results
      - name: context_doc
        source: step_output
        step_id: gather-context
        output_name: context_doc
    outputs:
      - name: bug_reports
        type: string
    optional: false
    timeout_ms: 300000

  - id: compile-report
    agent: team-lead
    task: >
      Compile the test session report. Synthesize: test results per platform,
      coverage analysis, bugs filed, severity distribution, and actionable
      recommendations. This is the final output of the test swarm run.
    depends_on:
      - execute-platform-a
      - execute-platform-b
      - file-bugs
      - validate-coverage
    inputs:
      - name: platform_a_results
        source: step_output
        step_id: execute-platform-a
        output_name: platform_a_results
      - name: platform_b_results
        source: step_output
        step_id: execute-platform-b
        output_name: platform_b_results
      - name: bug_reports
        source: step_output
        step_id: file-bugs
        output_name: bug_reports
      - name: coverage_report
        source: step_output
        step_id: validate-coverage
        output_name: coverage_report
    outputs:
      - name: session_report
        type: string
    optional: false
    timeout_ms: 300000
