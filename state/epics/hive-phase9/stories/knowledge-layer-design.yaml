title: Design agent-callable knowledge layer architecture
status: pending
complexity: high
depends_on: []

description: |
  Design the knowledge layer that agents can query during execution. Three
  sources: external docs (context7/chub), project knowledge (past decisions,
  quality feedback), and capability catalog (available tools/agents/workflows).

  Inspired by Pattern 5 from architecture-influences.md. Builds on the agent
  memory system (phase 6) but broader — cross-agent, cross-session, with
  annotation capability.

acceptance_criteria:
  - "Given the knowledge layer design, then it defines three source types and their access patterns"
  - "Given agents during execution, then they can query the knowledge layer for relevant information"
  - "Given agents find new knowledge, then they can annotate it back for future sessions"
  - "Given the architecture, then it integrates with existing agent memory system"

