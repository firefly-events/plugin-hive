files_to_modify:
  - file: hive/hive.config.yaml
    change: MODIFY — add `agent_backends:` block (or extend external_models)
      with documented per-agent backend selection
  - file: skills/hive/skills/agent-spawn/SKILL.md
    change: MODIFY — add backend-routing branch at step 7; leave other steps
      untouched
  - file: skills/hive/skills/codex-invoke/SKILL.md
    change: CREATE — new skill
  - file: skills/hive/skills/codex-invoke/adapter-prefix.md
    change: CREATE — adapter prefix constant
  - file: CHANGELOG.md
    change: MODIFY — one-line entry for the new backend axis (PoC)

design_decisions:
  - decision: Reuse backend-developer.md verbatim with a runtime adapter
      prefix; do not fork the persona.
    rationale: Matches the "never improvise personas" rule; single source of
      truth; defers the fork decision until we have evidence codex needs a
      different persona. The Claude-specific parts (`tools:`, `model:`) are
      frontmatter hints that codex can be told to ignore in one line.

  - decision: Side-by-side cmux pane (visible), not headless JSON-RPC.
    rationale: PoC surfaces codex behavior for human inspection before we
      trust it. Aligns with "visibility is trust proxy" during trust-building;
      headless path can replace cmux later without changing the persona or
      routing layer.

  - decision: Hard-fail on missing prerequisites, no Claude fallback.
    rationale: Silent fallback would mask the very failures we need to see
      during PoC and give false signal that the codex path works.

  - decision: Approval policy defaults from git-worktree detection.
    rationale: Worktrees provide natural blast-radius isolation; `auto` is
      safe there. Outside a worktree the PoC should default to `deny` so
      codex cannot mutate shared state without explicit opt-in.

  - decision: Routing branches at a single point in agent-spawn (step 7),
      not throughout.
    rationale: Memory loading, domain, skill injection are all model-agnostic
      — they produce prompt content, not invocation targets. Keeping
      backend-awareness confined to the final dispatch preserves the current
      spawn contract.

cross_cutting:
  - concern: cost / bias
    action: "Log model backend used in the episode record so future telemetry
      can attribute cost and outcomes by backend. Do not build the telemetry
      in this story — just ensure the data point lands."
  - concern: security
    action: "Codex runs with its own sandbox + approval policy. Document in
      codex-invoke SKILL.md that approval: auto is only safe inside a
      worktree. Do not widen this default in follow-up stories without
      review."

risks:
  - severity: medium
    description: "Terminal scraping for thread id and completion is fragile;
      codex output format may change between versions."
    mitigation: "Capture the raw transcript; parse thread id with a loose
      regex and tolerate absence (warn, do not fail). Follow-up story can
      migrate to codex's JSON-RPC app-server when we commit to headless."

  - severity: low
    description: "Cmux is macOS-only; non-mac contributors cannot run this
      path."
    mitigation: "Scope is PoC. If backend=codex is selected on a non-mac
      machine, hard-fail at pre-flight with a clear message. Headless
      follow-up story removes the cmux dependency."

  - severity: low
    description: "Adapter prefix is too terse and codex still tries to call
      Claude tools."
    mitigation: "If observed during test step, expand the adapter prefix in
      adapter-prefix.md (single file edit). Track any such drift in the
      review step."

references:
  - path: hive/agents/backend-developer.md
    relevant_excerpt: "Reused verbatim as the codex system prompt content.
      Frontmatter `tools:` and `model:` are overridden by the adapter prefix."
  - path: skills/hive/skills/agent-spawn/SKILL.md
    relevant_excerpt: "Step 7 'Construct the spawn call' is the single
      branching point. All prior steps (memory loading, skills, domain)
      produce backend-agnostic prompt content and remain unchanged."
  - path: hive/hive.config.yaml
    relevant_excerpt: "Existing external_models section already references
      codex as a 'second-model reviewer for adversarial review'. The new
      agent_backends axis extends this into a spawn-time backend selector."
