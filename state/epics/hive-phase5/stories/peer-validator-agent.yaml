      /Users/don/Documents/project-hive/blueprints/validation-team/peer-validator.yaml
      Read skills/hive/agents/reviewer.md to understand the boundary:
      - Reviewer = within-story code review (correctness, conventions, security)
      - Peer-validator = cross-story/cross-team validation (consistency, integration)
      Read skills/hive/agents/researcher.md for format reference.
    agent: researcher

  - id: write-persona
