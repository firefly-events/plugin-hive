description: |
  Port the peer-validator blueprint from Project Hive to a Hive agent persona
  at skills/hive/agents/peer-validator.md. This agent provides cross-team
  validation — checking work from one team against standards, conventions,
  and the broader project context. Different from the reviewer (which reviews
  within a story's workflow), the peer-validator checks across stories/teams.

acceptance_criteria:
  - "Given skills/hive/agents/peer-validator.md exists, when read, then it follows the Hive persona format"
  - "Given the peer-validator reviews work, then it checks against project-wide conventions, not just story-level spec"
  - "Given the persona, then it covers: cross-story consistency, convention enforcement, integration risk assessment"

steps:
