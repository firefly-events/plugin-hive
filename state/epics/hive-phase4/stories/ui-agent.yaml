code_examples:
  - title: Frame0 wireframe creation sequence
    language: bash
    code: |
      # Create project
      cli-anything-frame-zero project new --name "login-screen"

      # Add a page
      cli-anything-frame-zero --project login-screen.f0 page add --name "Login"

      # Add phone frame (get page-id from page list)
      cli-anything-frame-zero --project login-screen.f0 shape frame \
        --page-id PAGE_ID --preset phone --left 0 --top 0

      # Add UI elements
      cli-anything-frame-zero --project login-screen.f0 shape text \
        --page-id PAGE_ID --content "Welcome Back" --left 24 --top 80 --font-size 24

      cli-anything-frame-zero --project login-screen.f0 shape rectangle \
        --page-id PAGE_ID --left 24 --top 160 --width 327 --height 48 \
        --corner-radius 8

      # Export (requires Frame0 running)
      cli-anything-frame-zero --live export page \
        --page-id PAGE_ID --format png --output /tmp/login-wireframe.png

  - title: Existing wireframe brief pattern (from Shindig)
    language: markdown
    code: |
      ## Overview
      Single-screen event detail view with hero image, date block, RSVP buttons

      ## Layout
      - Hero image: full-width, 200px height
      - Date block: left-aligned, below hero
      - Title: 24px, bold, below date
      - RSVP buttons: bottom-fixed, full-width

      ## Design Tokens
      - Primary: $olive12
      - Text: $gray11
      - Spacing: 16px grid

design_decisions:
  - decision: Tool discovery is the first step, not assumed
    rationale: |
      Frame0 may not be installed in all environments. The agent must be useful
      even without it — falling back to text descriptions and ASCII layouts.
      This makes the persona portable.
  - decision: Include Frame0 CLI quick-reference inline
    rationale: |
      The agent needs the CLI commands in its context to use them effectively.
      Referencing an external doc adds a round-trip. A concise quick-reference
      section is more efficient.
  - decision: Name the file ui-designer.md not ux.md
    rationale: |
      "UI designer" better describes the output focus (visual artifacts:
      wireframes, mockups). "UX" is broader and overlaps with analyst territory
      (user research, information architecture at the system level).

dev_notes: |
  The Frame0 CLI has two modes that matter:
  - Offline: all shape/page/project commands work without Frame0 running.
    This is sufficient for building wireframes programmatically.
  - Live: export requires Frame0 running (it renders via the app's engine).
    If Frame0 isn't running, the agent can still produce .f0 files and
    instruct the user to open them in Frame0 for visual review.

  Existing wireframe briefs from Shindig use markdown with design tokens
  ($olive12, $gray11, etc.) and specific spacing values. The UI agent should
  follow this convention when producing briefs for Shindig-related work.

  The agent should use Lucide icons (Frame0's built-in library) via the
  `icon search` command to find appropriate icons by keyword.

risks:
  - severity: medium
    description: |
      Frame0 CLI may not be on PATH in all environments (it's installed
      via pip in a specific Python framework path).
    mitigation: |
      Tool discovery step checks `which cli-anything-frame-zero` first.
      If not found, the agent falls back to text-based design specs.
  - severity: medium
    description: |
      Live export requires Frame0 desktop app running. Agents can't
      launch GUI apps.
    mitigation: |
      The agent produces .f0 files (offline) and export commands (for human
      to run). The touchpoints story (ui-touchpoints) handles the human
      interaction for exports.

