description: |
  Define how artifacts transfer between swarms (planning → dev → testing).
  Structured handoff schema with status tracking (pending → consumed → expired).
  Enables chained workflows where one swarm's output feeds into the next.

acceptance_criteria:
  - "Given planning completes, then its artifacts can be handed off to a dev swarm"
  - "Given the handoff schema, then it includes: artifacts, decisions, naming, technology, constraints, status"
  - "Given a handoff is consumed, then the receiving swarm acknowledges receipt"

