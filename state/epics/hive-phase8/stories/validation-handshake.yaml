id: validation-handshake
epic: hive-phase8
title: Add validation handshake protocol for peer review
status: pending
complexity: medium
depends_on: [quality-gate-engine]

description: |
  Define the three-step validation handshake for peer review tier:
  1. Submit — agent provides work with validation criteria
  2. Validate — peer-validator agent reviews and returns findings with evidence
  3. Verify — submitting agent verifies findings before they surface

  This uses the peer-validator agent persona created in phase 5.

acceptance_criteria:
  - "Given output is routed to peer review, then the three-step handshake executes"
  - "Given the handshake, then the peer-validator provides evidence-based findings"
  - "Given findings, then the submitting agent can verify before escalation"

