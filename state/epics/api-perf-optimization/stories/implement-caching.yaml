id: implement-caching
epic: api-perf-optimization
title: Implement Redis Response Cache Layer
status: pending
complexity: high
depends_on:
  - cache-strategy
  - mongodb-query-optimization

description: |
  Implement the cache strategy designed in cache-strategy as a Fastify plugin. The
  plugin transparently caches GET responses in Redis (already deployed for rate
  limiting), invalidates on writes, and adds ETag support for the KMP Ktor client.
  This story builds on the query optimizations from mongodb-query-optimization —
  we're caching the already-optimized responses, not the slow originals.

acceptance_criteria:
  - "Given a GET /api/events request, when the response is not in cache, then it is stored in Redis with the configured TTL and X-Cache: MISS header is returned"
  - "Given a GET /api/events request, when the response IS in cache, then the cached response is returned with X-Cache: HIT header and MongoDB is not queried"
  - "Given a POST/PUT/DELETE to an event, when the write succeeds, then all related cache entries (list caches for the event's city, detail cache for that event ID) are invalidated"
  - "Given a GET /api/events/:id with If-None-Match header matching the cached ETag, then 304 Not Modified is returned with no body"
  - "Given trending recomputation runs (cron), then trending cache entries are invalidated"
  - "Given two concurrent cache misses for the same key, then only one MongoDB query executes (stampede protection)"
  - "Given baseline response times, when caching is active, then cached endpoint response times improve by at least 60%"

steps:
  - id: create-cache-plugin
    description: |
      Create src/plugins/response-cache.plugin.ts following the fp() pattern
      from rate-limit.plugin.ts. The plugin should:
      1. Accept CacheOptions config (Redis client, default TTL, route configs)
      2. Register onRequest hook for cache lookup
      3. Register onSend hook for cache storage
      4. Export as fastify-plugin with name 'response-cache'
      Use the existing Redis connection from the rate-limit setup (avoid creating
      a second Redis connection).
    agent: developer

  - id: implement-stampede-protection
    description: |
      Add singleflight/lock pattern to prevent cache stampede. When a cache miss
      occurs, acquire a short Redis lock (SET key:lock NX EX 5). If lock acquired,
      compute and store. If lock exists, wait briefly (50ms poll) then re-check
      cache. Fall through to direct query after 3 retries to avoid deadlock.
    agent: developer
    depends_on: [create-cache-plugin]

  - id: configure-routes
    description: |
      Configure cache TTLs per route in the plugin registration:
      - /api/events (list): 30s TTL, key includes query params hash
      - /api/events/trending: 60s TTL, key includes city
      - /api/events/weekly-picks: 3600s TTL (1hr), key includes city
      - /api/events/:id (detail): 10s TTL, key is event ID
      - /api/events/promoted: 60s TTL, key includes collection + params hash
      Register the plugin in app.ts after the rate-limit plugin.
    agent: developer
    depends_on: [create-cache-plugin]

  - id: implement-invalidation
    description: |
      Add cache invalidation on write operations. In event.controller.ts, after
      successful create/update/delete, call cache invalidation:
      - Create event → invalidate list caches for event's city
      - Update event → invalidate detail cache + list caches for event's city
      - Delete event → invalidate detail cache + list caches for event's city
      - RSVP action → invalidate detail cache for that event

      Use Redis SCAN with pattern matching (cache:/api/events:*) for list
      invalidation, or tag-based approach from the cache strategy.
    agent: developer
    depends_on: [configure-routes]

  - id: add-etag-support
    description: |
      Add ETag headers to cached responses. On cache store, compute ETag as
      hash of response body. On subsequent requests with If-None-Match header,
      compare against stored ETag. Return 304 if match.

      The KMP Ktor client supports conditional requests natively via
      HttpCache plugin — verify this works end-to-end.
    agent: developer
    depends_on: [create-cache-plugin]

  - id: measure-improvement
    description: |
      Re-run the baseline measurements for all cached endpoints. Compare:
      - Response time: cache HIT vs original baseline
      - MongoDB query count: before vs after (should drop significantly)
      - Redis memory usage: actual vs estimated from cache-strategy
      - Cache hit rate after 5 minutes of typical traffic

      Document results in:
      state/epics/api-perf-optimization/artifacts/caching-results.md
    agent: developer
    depends_on: [configure-routes, implement-invalidation, add-etag-support, implement-stampede-protection]

