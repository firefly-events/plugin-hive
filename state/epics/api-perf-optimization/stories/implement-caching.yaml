files_to_modify:
  - file: src/plugins/response-cache.plugin.ts
    change: NEW FILE — Fastify cache-aside plugin with onRequest/onSend hooks
  - file: src/app.ts
    change: Register response-cache plugin after rate-limit, pass Redis connection
  - file: src/modules/events/event.controller.ts
    change: Add cache invalidation calls after create/update/delete operations
  - file: src/modules/events/events.routes.ts
    change: Optional — add route-level cache config if not handled at plugin level

code_examples:
  - title: Existing plugin registration pattern (app.ts)
    language: typescript
    code: |
      // app.ts — how plugins are registered
      await fastify.register(rateLimitPlugin);
      await fastify.register(metricsPlugin);
      // Cache plugin goes here, after rate-limit (needs Redis connection)
      await fastify.register(responseCachePlugin, {
        redis: fastify.redis, // or however Redis is exposed
        defaultTTL: 30,
        routes: {
          '/api/events': { ttl: 30 },
          '/api/events/trending': { ttl: 60 },
          '/api/events/weekly-picks': { ttl: 3600 },
        }
      });
  - title: Cache invalidation in controller
    language: typescript
    code: |
      // event.controller.ts — after successful event update
      async updateEvent(request, reply) {
        const result = await eventService.updateEvent(id, body);
        // Invalidate caches
        const city = result.event.city;
        await request.server.cacheInvalidate(`cache:/api/events/${id}`); // detail
        await request.server.cacheInvalidatePattern(`cache:/api/events:*city=${city}*`); // lists
        return reply.send(result);
      }
  - title: Singleflight pattern
    language: typescript
    code: |
      async function getOrCompute(redis, key, ttl, computeFn) {
        const cached = await redis.get(key);
        if (cached) return { data: JSON.parse(cached), hit: true };

        const lockKey = `${key}:lock`;
        const locked = await redis.set(lockKey, '1', 'NX', 'EX', 5);
        if (!locked) {
          // Another request is computing — wait and retry
          await new Promise(r => setTimeout(r, 50));
          const retried = await redis.get(key);
          if (retried) return { data: JSON.parse(retried), hit: true };
        }

        const data = await computeFn();
        await redis.set(key, JSON.stringify(data), 'EX', ttl);
        await redis.del(lockKey);
        return { data, hit: false };
      }

design_decisions:
  - decision: Use onRequest/onSend hooks rather than route-level decorators
    rationale: |
      Hook-based approach is transparent — existing routes don't need modification.
      Cache is opt-in via route config, but the mechanism is centralized in one plugin.
  - decision: Cache invalidation on write rather than TTL-only
    rationale: |
      For event detail pages, users expect to see their RSVP reflected immediately.
      TTL-only with 10s delay would confuse users. Invalidation on write + short TTL
      as safety net gives both freshness and performance.
  - decision: Use Redis SCAN for pattern-based invalidation (not KEYS)
    rationale: |
      KEYS is O(n) and blocks Redis. SCAN is cursor-based and non-blocking.
      For list cache invalidation by city, pattern matching via SCAN is safer.

behavior_matrix:
  - condition: "GET request, route in cache config, cache HIT"
    behavior: "Return cached response, set X-Cache: HIT header, skip handler"
  - condition: "GET request, route in cache config, cache MISS"
    behavior: "Execute handler, store response in Redis with TTL, set X-Cache: MISS"
  - condition: "GET request, route NOT in cache config"
    behavior: "Pass through unchanged — no caching"
  - condition: "Non-GET request (POST/PUT/DELETE)"
    behavior: "Pass through unchanged — never cache writes"
  - condition: "Request with X-No-Cache header"
    behavior: "Bypass cache lookup, execute handler, but still store result"
  - condition: "Request with If-None-Match matching cached ETag"
    behavior: "Return 304 Not Modified with no body"

dev_notes: |
  The Redis connection is already established by the rate-limit plugin. Check how
  it's exposed — it may be on `fastify.redis` (if using @fastify/redis) or a custom
  decorator. The cache plugin should reuse this connection, not create its own.

  The weekly-picks endpoint calls the Gemini AI curation service which is slow (~2-5s).
  Caching this at 1hr TTL is the single biggest performance win in this story since
  the AI response is deterministic for the same city within a given week.

  The KMP Ktor client has an HttpCache plugin that handles ETags automatically if
  the server returns proper ETag + Cache-Control headers. Verify this works by
  checking the Ktor client configuration in the KMP codebase.

risks:
  - severity: high
    description: |
      Cache stampede on trending endpoint at popular times. If 100 users request
      trending Austin events at the same second and the cache just expired, all
      100 hit MongoDB simultaneously.
    mitigation: |
      Singleflight lock pattern (step implement-stampede-protection). First request
      acquires lock, others wait 50ms and retry. Max 3 retries, then fall through.
  - severity: medium
    description: |
      Redis connection failure should not break the API. If Redis is down, cache
      operations should fail silently and the API should serve directly from MongoDB.
    mitigation: |
      Wrap all Redis operations in try/catch. On Redis error, log warning and
      fall through to handler. Never throw from cache operations.
  - severity: medium
    description: |
      Serialization of Mongoose documents to JSON for caching may differ from
      Fastify's serialization (which uses schema-based serializers). Cached
      responses might have different field names or formats.
    mitigation: |
      Cache the serialized response from onSend (after Fastify serialization),
      not the raw Mongoose document. This ensures cached and uncached responses
      are identical.
  - severity: low
    description: |
      Cache key collision if query param ordering varies between requests.
      /api/events?city=austin&limit=50 vs /api/events?limit=50&city=austin
    mitigation: |
      Canonical key function that sorts params alphabetically before hashing.

references:
  - src/plugins/rate-limit.plugin.ts — Redis plugin pattern
  - src/plugins/metrics.plugin.ts — Fastify plugin with hooks pattern
  - src/app.ts — Plugin registration order
  - src/modules/events/event.controller.ts — Write operations needing invalidation
  - src/modules/events/events.routes.ts — Routes to cache
