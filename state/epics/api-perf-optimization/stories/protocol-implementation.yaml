id: protocol-implementation
epic: api-perf-optimization
title: Implement Recommended API Protocol Changes
status: pending
complexity: high
depends_on:
  - api-protocol-research
  - implement-caching

description: |
  Implement the API protocol changes recommended by the api-protocol-research story.
  The exact scope depends on that recommendation, but the most likely outcome is
  optimized REST (sparse fieldsets + cursor pagination) given the KMP/Ktor client
  constraint. This story covers the top 3 highest-impact endpoints, updates the
  KMP client, and maintains backward compatibility.

  This story is intentionally open-ended — the steps below cover the most likely
  recommendation (optimized REST). If the research recommends GraphQL (Mercurius),
  the steps should be adapted accordingly.

acceptance_criteria:
  - "Given the research recommendation, when the top 3 endpoints are updated, then the new query patterns reduce payload sizes by the amount estimated in the research"
  - "Given a KMP client request with ?fields=title,startTime,venue, when the server processes it, then only those fields are returned in the response"
  - "Given a list endpoint with cursor pagination, when the client sends ?cursor=abc, then the next page of results is returned without skip/offset overhead"
  - "Given an older app version without the new query patterns, when it calls the existing endpoints, then responses are unchanged (backward compatibility)"
  - "Given the new endpoints, when Swagger/OpenAPI docs are generated, then the new query parameters and response shapes are documented"
  - "Given baseline measurements, when new patterns are in use, then measurable performance improvement is demonstrated"

steps:
  - id: read-recommendation
    description: |
      Read the protocol recommendation from:
      state/epics/api-perf-optimization/artifacts/protocol-recommendation.md

      Identify:
      - Which approach was recommended (likely optimized REST)
      - Which endpoints are highest priority
      - What the estimated effort and impact are
      - Any caveats or prerequisites
    agent: researcher

  - id: implement-sparse-fieldsets
    description: |
      Add ?fields= query parameter support to event list endpoints. This lets the
      KMP client request only the fields it needs for each view.

      Implementation approach:
      1. Create a parseFieldSelection() utility in src/utils/
      2. Add 'fields' to the event list query schema (Zod)
      3. In event.service.ts getEvents(), convert fields param to Mongoose .select()
      4. Apply same pattern to searchEvents() and getPromotedEvents()
      5. Default behavior (no ?fields param) returns full document (backward compat)

      The field selection should work with nested paths: ?fields=title,venue.name,images[0]
    agent: developer
    depends_on: [read-recommendation]

  - id: implement-cursor-pagination
    description: |
      Replace skip/limit pagination with cursor-based pagination for event list
      endpoints. Skip-based pagination degrades on large collections because
      MongoDB must scan past skipped documents.

      Implementation approach:
      1. Use the last document's _id + startTime as cursor (encoded as base64)
      2. On next page, query with { startTime: { $gte: cursorTime }, _id: { $gt: cursorId } }
      3. Return cursor in response: { events: [...], nextCursor: "abc", hasMore: true }
      4. Keep skip/limit working for backward compatibility (default if no cursor param)

      This is most impactful for the main event list which can have thousands of results.
    agent: developer
    depends_on: [read-recommendation]

  - id: update-kmp-client
    description: |
      Update the KMP Ktor HTTP client to use the new query patterns:
      1. Add ?fields= parameter to event list API calls with only the fields
         needed for each view (list view, detail view, map view use different fields)
      2. Implement cursor-based pagination in the paging data source
      3. Ensure backward compatibility — if the server doesn't return a cursor,
         fall back to offset pagination

      Check the KMP networking layer at:
      composeApp/src/commonMain/kotlin/com/shindig/ for the API client code.
    agent: developer
    depends_on: [implement-sparse-fieldsets, implement-cursor-pagination]

  - id: update-api-docs
    description: |
      Update Swagger/OpenAPI documentation:
      1. Add ?fields query parameter to event list endpoint schemas
      2. Add ?cursor query parameter and document cursor-based pagination
      3. Add examples showing field selection and cursor usage
      4. Mark old skip/limit params as deprecated (not removed)

      The swagger plugin is at src/plugins/swagger.ts and schemas are defined
      via fastify-zod in each module's .schema.ts file.
    agent: developer
    depends_on: [implement-sparse-fieldsets, implement-cursor-pagination]

  - id: measure-improvement
    description: |
      Compare against baseline:
      - Payload size reduction with field selection (expected 60-80% for list views)
      - Pagination performance: cursor vs skip for page 10, page 50, page 100
      - End-to-end response time with caching + field selection + cursor pagination

      Document in:
      state/epics/api-perf-optimization/artifacts/protocol-implementation-results.md
    agent: developer
    depends_on: [update-kmp-client, update-api-docs]

context:
  codebase: ~/Documents/KMP/Shindig/event-api
  frontend_codebase: ~/Documents/KMP/Shindig/composeApp
  tech_stack:
    backend: Fastify 5.x + TypeScript + Mongoose/MongoDB + Zod schemas
    frontend: KMP Compose + Ktor HTTP client
  key_files:
