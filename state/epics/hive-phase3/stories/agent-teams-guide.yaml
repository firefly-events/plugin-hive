id: agent-teams-guide
epic: hive-phase3
title: Create Agent Teams Reference Guide
status: pending
complexity: medium
depends_on: []

description: |
  Create the agent-teams-guide reference document for the Hive plugin. This doc
  explains how to use Claude Code's experimental agent teams feature for parallel
  story execution, and how to fall back to sequential execution when agent teams
  aren't available.

  Agent teams are Claude Code's native multi-agent system: a team lead spawns
  teammates as separate Claude Code instances, each with their own context window.
  Tasks have dependency tracking (pending → in-progress → completed) and auto-unblock
  when dependencies complete. Teammates self-claim available work.

  This is the reference doc the execute command reads when deciding whether to
  use parallel or sequential execution.

acceptance_criteria:
  - "Given the reference doc, when the execute command needs to decide execution mode, then it can determine if agent teams are available"
  - "Given agent teams are available, when the doc is read, then it explains how to generate a team config with task dependencies from an epic"
  - "Given agent teams are NOT available, when the doc is read, then it explains the sequential fallback (which already works)"
  - "Given the doc, then it covers: detection, config generation, teammate spawning, task dependency mapping, communication, and limitations"

steps:
  - id: research-agent-teams
    description: |
      The agent teams documentation was already researched earlier in this session.
      Key facts to include:
      - Enable via CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 env var
      - Team lead creates and coordinates teammates
      - Each teammate has its own context window
      - Shared task list with dependency tracking
      - Tasks: pending → in-progress → completed
      - Dependencies auto-unblock when predecessors complete
      - Teammates self-claim next available unblocked task
      - Communication via mailbox (message, broadcast)
      - Config stored at ~/.claude/teams/{team-name}/config.json
      - Limitations: no nested teams, no session resumption, one team per session

      Also reference: https://code.claude.com/docs/en/agent-teams
    agent: researcher

  - id: write-guide
    description: |
      Create skills/hive/references/agent-teams-guide.md with sections:

      1. Overview — what agent teams are and when Hive uses them
      2. Detection — how to check if agent teams are available
         (check CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS env var)
      3. Mapping Epics to Teams — how story dependencies become task dependencies
         - Each story = one task
         - story.depends_on maps to task dependencies
         - Independent stories (no shared deps) run in parallel as separate teammates
         - Dependent stories wait for predecessors
      4. Team Config Generation — the JSON structure to produce
      5. Execution Flow — how the lead coordinates
      6. Fallback — sequential execution (already implemented, just reference it)
      7. Limitations — what doesn't work with agent teams

      Follow the format of existing reference docs (workflow-schema.md, episode-schema.md).
    agent: developer
    depends_on: [research-agent-teams]

context:
  codebase: /Users/don/Documents/herd
  key_files:
    - skills/hive/references/workflow-schema.md — reference doc format to match
    - skills/hive/references/episode-schema.md — reference doc format to match
    - skills/hive/ORCHESTRATOR.md — execute command that will reference this doc

files_to_modify:
  - file: skills/hive/references/agent-teams-guide.md
    change: NEW FILE — agent teams reference guide

code_examples:
  - title: Epic-to-team mapping
    language: yaml
    code: |
      # Epic stories:
      #   story-a (no deps)     → task-a (unblocked, runs immediately)
      #   story-b (no deps)     → task-b (unblocked, runs in parallel with a)
      #   story-c (deps: a, b)  → task-c (blocked until a AND b complete)

      # The lead generates a natural-language team request:
      # "Create a team to work on epic hive-phase3.
      #  Task 1: agent-teams-guide — no dependencies
      #  Task 2: code-review-workflow — no dependencies
      #  Task 3: review-command — no dependencies
      #  Task 4: parallel-execution — depends on task 1
      #  Tasks 1-3 can run in parallel."
  - title: Detection logic
    language: javascript
    code: |
      // Check if agent teams are available
      const agentTeamsEnabled =
        process.env.CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS === '1';

design_decisions:
  - decision: Agent teams map at the story level, not the step level
    rationale: |
      Phases within a story are always sequential (research → implement → test → review).
      Parallelism is between independent stories. This matches the user's stated intent:
      "parallel execution could occur if we're attacking an epic at scale and none of
      the stories are dependent."
  - decision: Team creation uses natural language, not config files
    rationale: |
      Claude Code agent teams are created via natural language prompts to the lead,
      not by writing JSON config files. The execute command describes the team
      structure and dependencies in prose, and Claude Code handles the mechanics.

dev_notes: |
  Agent teams are EXPERIMENTAL (disabled by default). The execute command must
  always work without them — the sequential fallback from Phase 1 is the default.
  Agent teams are an optimization, not a requirement.

  Key limitation: no nested teams. A teammate cannot spawn its own team. This means
  within a story, phases still execute sequentially via subagent spawning (not
  agent teams). Only story-level parallelism uses teams.

  Another limitation: one team per session. If the user starts a new epic execution,
  the previous team must be cleaned up first.

risks:
  - severity: medium
    description: |
      Agent teams are experimental and the API/behavior may change. The guide
      may become outdated if Claude Code updates the feature.
    mitigation: |
      Reference the official docs URL. Keep the guide focused on the mapping
      logic (epic → team) rather than low-level team mechanics.
  - severity: low
    description: |
      The guide describes features the user may not have enabled. Running
      /hive:execute without CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 should
      clearly fall back to sequential without confusing error messages.
    mitigation: |
      The execute command should check for the env var and silently fall back.
      The guide should explain this upfront.

references:
  - https://code.claude.com/docs/en/agent-teams — official docs
  - skills/hive/references/workflow-schema.md — format to match
  - skills/hive/ORCHESTRATOR.md — execute command that references this
