# Phase 3 — Proposals
approved_proposals:
  - id: proposal-1
    title: Add analyst starter memories (2 memories)
    addresses_findings: [finding-2]
    impact_score: 4
    risk_score: 1
    effort_score: 1
    priority_score: 20.0
    charter_objective: coverage
    implementation_plan:
      - step: Create pitfall memory — requirements traceability gaps go undetected when analyst doesn't map all capabilities
        file: skills/hive/agents/memories/analyst/trace-every-capability-to-a-story.md
        action: create
      - step: Create pattern memory — decompose ambiguous requirements into measurable acceptance criteria before passing to architect
        file: skills/hive/agents/memories/analyst/measurable-acceptance-criteria-first.md
        action: create
    rationale: |
      analyst is Opus-tier and participates in every planning phase. It is the first agent
      to process raw user requirements into traceable stories. Without starter memories,
      the analyst starts blind: it will miss the traceability protocol, invent ambiguous
      criteria, and skip gap reporting. These two memories address the two most common
      analyst failure modes: unmapped capabilities and untestable acceptance criteria.
    risk_notes: |
      New files only — no existing content touched. Risk is near-zero.

  - id: proposal-2
    title: Add peer-validator starter memories (2 memories)
    addresses_findings: [finding-3]
    impact_score: 3
    risk_score: 1
    effort_score: 1
    priority_score: 15.0
    charter_objective: coverage
    implementation_plan:
      - step: Create pitfall memory — do not evaluate within-story correctness; that is the reviewer's job
        file: skills/hive/agents/memories/peer-validator/stay-in-cross-story-lane.md
        action: create
      - step: Create pattern memory — always check naming consistency and shared-interface usage before checking logic
        file: skills/hive/agents/memories/peer-validator/convention-consistency-before-logic.md
        action: create
    rationale: |
      peer-validator is the cross-story consistency gate. Without starter memories, it
      tends to overlap with the reviewer's within-story evaluation rather than focusing
      on cross-story convention compliance and interface consistency. These two memories
      establish the scope boundary and the check order.
    risk_notes: |
      New files only — no existing content touched.

  - id: proposal-3
    title: Expand insight-capture.md from stub to full reference doc
    addresses_findings: [finding-1]
    impact_score: 4
    risk_score: 1
    effort_score: 2
    priority_score: 10.0
    charter_objective: clarity
    implementation_plan:
      - step: Expand hive/references/insight-capture.md with full format, staging path, keep/discard criteria, and one complete example
        file: hive/references/insight-capture.md
        action: add_section
    rationale: |
      insight-capture.md is referenced from MAIN.md and is the primary guidance agents use
      to decide whether to stage an insight. At 13 lines it provides only the trigger list
      and a format pointer. Missing: the complete frontmatter format (agents must look it up
      in agent-memory-schema.md), the staging path conventions, how to name the file, and
      what constitutes a promotable insight. The result is agents either skip insight capture
      entirely or stage low-quality entries that get discarded at session-end.
    risk_notes: |
      Content-additive only — existing 13 lines are kept verbatim. New sections appended.

  - id: proposal-4
    title: Add technical-writer and ui-designer starter memories
    addresses_findings: [finding-4, finding-5]
    impact_score: 3
    risk_score: 1
    effort_score: 2
    priority_score: 7.5
    charter_objective: coverage
    implementation_plan:
      - step: Create pitfall memory for technical-writer — never produce prose analysis; write structured documents only
        file: skills/hive/agents/memories/technical-writer/structured-docs-not-prose-analysis.md
        action: create
      - step: Create pattern memory for technical-writer — confirm which skill applies before writing any document
        file: skills/hive/agents/memories/technical-writer/match-skill-to-document-type.md
        action: create
      - step: Create pitfall memory for ui-designer — always check Frame0 CLI availability before starting; fall back to text specs if unavailable
        file: skills/hive/agents/memories/ui-designer/check-frame0-cli-availability-first.md
        action: create
      - step: Create pattern memory for ui-designer — one screen per frame0 page, named exactly as in the screen list
        file: skills/hive/agents/memories/ui-designer/one-screen-per-page-canonical-naming.md
        action: create
    rationale: |
      technical-writer produces the research brief that every subsequent agent depends on.
      Its most common failure is producing flowing prose rather than structured sections,
      making the brief hard to use. ui-designer has a tool dependency (Frame0 CLI) that
      is easy to miss; agents that skip the availability check fail mid-workflow.
    risk_notes: |
