# Meta Team Cycle State
# Tracks the current cycle's progress. Updated at every phase boundary.
# Only one cycle runs at a time — enforced by cycle_lock.

cycle_id: null                      # format: nightly-{date}, null when idle
phase: "idle"                       # enum: idle, boot, analysis, proposal, implementation,
                                    #       testing, evaluation, promotion, close
started_at: null                    # ISO datetime when cycle began
budget_total_min: 300               # 5-hour window (300 minutes)
budget_remaining_min: 300           # decremented at phase boundaries
in_flight_target_id: null           # target currently being processed, null when idle
interrupted: false                  # true if previous cycle didn't complete cleanly
resume_from: null                   # phase to resume from if interrupted, null otherwise
baseline_tag: null                  # git tag name for this cycle's baseline (e.g., meta-team/baseline-2026-04-08)
proposals_this_cycle: 0             # count of proposals attempted this cycle
charter_path: "state/meta-team/charter.md"  # path to the optimization charter (created in S2)

cycle_lock:
  locked_by: null                   # cycle_id that holds the lock, null when unlocked
  locked_at: null                   # ISO datetime when lock was acquired, null when unlocked
  # Stale lock threshold: 6 hours. If locked_at > 6 hours ago, the lock is
  # considered stale and can be overridden. This prevents two cycles from
  # running simultaneously while allowing recovery from crashed cycles.
  # The 6-hour threshold = 5-hour budget + 1-hour buffer.
