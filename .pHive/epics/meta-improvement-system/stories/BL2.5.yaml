description: |
  Execute the first full live maintainer cycle against a trivial candidate and
  record a verification document with durable artifact references.
  This story proves that the local maintainer path can complete a clean,
  worktree-isolated no-op or trivial cycle through the rewritten control plane
  before the deliberate-regression rollback proof is attempted.
  The verification document should cite the run artifacts directly: envelope
  path, event references, commit SHA, rollback target, and any relevant worktree
  cleanup evidence. Narrative summary alone is not sufficient.
  Do execute the live proving run and write the verification doc. Do not use
  this story to satisfy the rollback-realism proof requirement; that remains
  explicitly reserved for BL2.6.

acceptance_criteria:
  - "Given the first live proving run, when `/meta-meta-optimize` executes against a trivial backlog target, then the cycle completes inside a worktree rather than the main tree."
  - "Given the verification doc, when it is read, then it points to durable run artifacts including commit SHA, metrics snapshot reference, rollback target reference, and representative event or envelope paths."
  - "Given the proving-run scope, when the story completes, then the run is evidence-backed but does not claim rollback-realism proof on its own."

