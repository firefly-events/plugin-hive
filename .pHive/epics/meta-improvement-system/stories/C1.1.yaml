id: C1.1
epic: meta-improvement-system
slice: S2
title: Metrics directory and carrier README
status: pending
complexity: medium
methodology: classic
depends_on: ["B0.1", "B0.2", "B0.3"]

description: |
  Create the inert dual-schema carrier layout under `.pHive/metrics/` and
  document how the directory is organized before any live emitters exist.
  This story establishes the top-level README plus the `events/` and
  `experiments/` subdirectories that later stories will populate.
  The README content must explain the split between append-only JSONL events and
  experiment envelope records, the default-off nature of metrics writes, and
  the expectation that only approved schema files define record shape.
  Do create discoverable docs and directories. Do not add emitters, hooks, or
  ad hoc record formats outside the planned schema files.

acceptance_criteria:
  - "Given the carrier story, when the repo is inspected, then `/Users/don/Documents/plugin-hive/.pHive/metrics/`, `/Users/don/Documents/plugin-hive/.pHive/metrics/events/`, and `/Users/don/Documents/plugin-hive/.pHive/metrics/experiments/` exist."
  - "Given the README set, when a reader opens the docs, then the dual-schema split, directory purpose, and retention/convention notes are clearly described."
  - "Given metrics are opt-in later, when the carrier docs are reviewed, then they do not imply that emission is on by default."
  - "Given this is substrate-only work, when the story completes, then no hook sites or workflow emitters have been added."

steps:
  - id: research
    description: "Confirm the dual-schema directory structure, doc touchpoints, and default-off framing from the outline, horizontal plan, and signed kickoff decision."
    agent: researcher
  - id: implement
    description: "Create `/Users/don/Documents/plugin-hive/.pHive/metrics/README.md`, `/Users/don/Documents/plugin-hive/.pHive/metrics/events/README.md`, and `/Users/don/Documents/plugin-hive/.pHive/metrics/experiments/README.md` with conventions aligned to the B0 contract."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Verify the directories and README files exist and mention the dual-schema carrier. Suggested checks: `test -f` for the three README paths and `rg -n \"dual-schema|events|experiments|default\" /Users/don/Documents/plugin-hive/.pHive/metrics/README.md`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review for terminology drift against B0 and confirm the docs do not promise emitters or config semantics that belong to later slices."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the carrier layout once the documentation review passes."
    agent: developer
    depends_on: [review]

