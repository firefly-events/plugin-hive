id: BL2i.5
epic: meta-improvement-system
slice: S8
title: Regression test proving `plugin.json` excludes `maintainer-skills/`
status: pending
complexity: medium
methodology: classic
depends_on: ["BL2i.3"]

description: |
  Add the structural packaging-boundary regression test that proves the shipped
  plugin manifest does not reference `maintainer-skills/`.
  This story is intentionally narrow and defensive: it should inspect
  `.claude-plugin/plugin.json`, assert the shipped `skills` root remains the
  public `./skills/` tree, and fail if any maintainer-skill path or
  `/meta-meta-optimize` registration leaks into the manifest.
  The test should be future-proof enough that S10 can still register
  `/meta-optimize` later without weakening the local-only boundary.
  Do add the regression coverage and any small manifest comments needed for
  clarity. Do not change the shipped skill surface in this slice.

acceptance_criteria:
  - "Given the packaging-boundary regression story, when tests run, then `.claude-plugin/plugin.json` is asserted to contain no `maintainer-skills/` reference."
  - "Given the local-only invariant, when the manifest is reviewed, then it still points at the public `./skills/` root and does not register `/meta-meta-optimize`."
  - "Given later public registration work, when the test is read, then it permits future `/meta-optimize` registration while continuing to ban maintainer-skill leakage."

