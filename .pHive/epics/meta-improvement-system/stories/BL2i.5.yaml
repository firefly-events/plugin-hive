  - id: implement
    description: "Create a manifest-boundary regression test such as `/Users/don/Documents/plugin-hive/tests/meta_meta/test_plugin_manifest_boundary.py` that asserts `.claude-plugin/plugin.json` contains no `maintainer-skills/` or `/meta-meta-optimize` registration."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Run the new manifest-boundary test and grep the manifest directly. Suggested checks: `pytest tests/meta_meta/test_plugin_manifest_boundary.py` and `rg -n \"maintainer-skills|meta-meta-optimize\" /Users/don/Documents/plugin-hive/.claude-plugin/plugin.json`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that the test proves the structural boundary without blocking the later public `/meta-optimize` registration story."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the packaging-boundary regression test once review passes."
    agent: developer
    depends_on: [review]

