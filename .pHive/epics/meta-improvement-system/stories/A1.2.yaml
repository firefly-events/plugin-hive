id: A1.2
epic: meta-improvement-system
slice: S3
title: Extract shared safety constraints
status: pending
complexity: low
methodology: classic
depends_on: ["B0.1", "B0.2", "B0.3"]

description: |
  Extract the reusable safety constraints from the old meta-team charter into a
  standalone reference that future swarm-specific charters can import.
  This story is a controlled salvage step: preserve the useful hard constraints
  without carrying forward the old single-swarm authority model.
  The new reference should capture the non-destructive, no-secrets, budget, and
  human-confirmation guardrails in neutral language suitable for both future
  swarms. Do not pull in obsolete scope tables or legacy operator workflow text.

acceptance_criteria:
  - "Given the extraction story, when `/Users/don/Documents/plugin-hive/hive/references/meta-safety-constraints.md` is opened, then the reusable safety constraints are present in standalone form."
  - "Given the new reference, when a future charter author reads it, then the constraints are clearly reusable without inheriting the old single-swarm mission/scope text."
  - "Given A1 scope, when the story completes, then the new reference exists even though the new charters themselves are deferred to S4."

steps:
  - id: implement
    description: "Create `/Users/don/Documents/plugin-hive/hive/references/meta-safety-constraints.md` by extracting the reusable hard-constraint language from the old charter and rewriting only enough to make it swarm-neutral."
    agent: developer
  - id: test
    description: "Verify the new reference covers the preserved constraints. Suggested checks: `rg -n \"No destructive operations|No secrets|budget|Human confirmation required\" /Users/don/Documents/plugin-hive/hive/references/meta-safety-constraints.md`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that the extracted reference preserves the real guardrails without copying over obsolete authority or mission text."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the new shared safety reference."
    agent: developer
    depends_on: [review]

