description: |
  Turn the local maintainer scaffold into a real orchestrator for the rewritten
  meta-team control plane.
  This story binds `maintainer-skills/meta-meta-optimize/SKILL.md` to the
  rewritten workflow surfaces so a maintainer run can enter through the local
  skill, traverse the approved control plane, and stay inside the worktree-
  isolated execution model by default.
  The orchestration must respect the two-swarm split, use the shared lifecycle
  library rather than embedding experiment logic in the skill, and preserve the
  non-bypassable close gate added earlier.
  Do wire the skill to the control plane and default worktree behavior. Do not
  yet claim end-to-end proof or write the MVL artifact in this story.

acceptance_criteria:
  - "Given the orchestration story, when the maintainer skill is read, then it invokes the rewritten meta-team control plane rather than a dry-run scaffold."
  - "Given the local maintainer path, when the control plane is traversed, then it uses worktree isolation by default and imports the shared lifecycle library instead of duplicating experiment logic."
  - "Given the rewritten two-swarm model, when the skill and workflow surfaces are reviewed, then the maintainer path does not revive single-swarm or public-shipping assumptions."
  - "Given S9 sequencing, when this story completes, then orchestration is live but proof-artifact capture remains for later stories."

