design_decisions:
  - decision: "Make BL3.6 the explicit MVS acceptance proof."
    rationale: "The vertical plan distinguishes MVL and MVS, and S10 needs its own durable public milestone evidence rather than inheriting S9 proof."
    source: "vertical-plan §4 | structured-outline S10"
  - decision: "Require PR-shaped closure evidence in the proof artifacts."
    rationale: "The public ship path is only honest if it demonstrates the `pr_ref` plus `pr_state` evidence family rather than a commit-shaped shortcut."
    source: "structured-outline R19 | cycle-state closure-evidence-shape-mismatch"

cross_cutting:
  - concern: documentation
    action: "Write public MVS proof artifacts under `/Users/don/Documents/plugin-hive/.pHive/audits/mvs-proof/` and document where maintainers can inspect the kickoff-to-PR acceptance evidence."

risks:
  - severity: high
    description: "A fixture run could appear successful while bypassing kickoff state or using direct mutation under the hood."
    mitigation: "Treat kickoff opt-in, metrics-enabled state, PR artifact creation, and PR-shaped closure evidence as separate required proof fields."
  - severity: high
    description: "The close path could still be using commit-shaped evidence implicitly, masking the architect’s R19 concern."
    mitigation: "Require `pr_ref` and `pr_state` in the proof artifact and inspect the close record during review."

