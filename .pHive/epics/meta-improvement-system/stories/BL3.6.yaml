id: BL3.6
epic: meta-improvement-system
slice: S10
title: First end-to-end public fixture run
status: pending
complexity: high
methodology: classic
depends_on: ["K.3", "BL2.6", "BL3.2", "BL3.3", "BL3.4", "BL3.5", "L1.7"]

description: |
  Execute the MVS acceptance run for the shipped public path: kickoff opt-in,
  metrics enabled, `/meta-optimize` invoked against a user-project fixture, and
  a PR artifact emitted with baseline-versus-candidate metrics attached.
  This story is the explicit public milestone proof, analogous to BL2.6 for MVL
  but with the public promotion and closure evidence shape.
  The fixture run must validate the real end-to-end path, not a synthetic
  shortcut: kickoff state must be read, metrics must flow, the public skill must
  orchestrate a real candidate run against a test target, and close validation
  must accept `pr_ref` plus `pr_state` rather than requiring `commit_ref`.
  Do write durable fixture-run evidence. Do not substitute narrative-only proof,
  direct mutation, or commit-shaped closure evidence for the public path.

acceptance_criteria:
  - "Kickoff opt-in is exercised and the fixture target ends the flow with metrics enabled."
  - "A real `/meta-optimize` run executes against a test user-project fixture and produces a PR artifact rather than direct repo mutation."
  - "The PR artifact or paired proof record includes baseline and candidate metrics for the run."
  - "The close record is accepted using `pr_ref` plus `pr_state` evidence and still includes a metrics snapshot reference and rollback target."
  - "Durable proof artifacts for the MVS run are written and inspectable after the run."

steps:
  - id: research
    description: "Select the fixture target, define the exact kickoff-to-PR proof steps, and specify the durable evidence fields needed to prove metrics-enabled public closure on `pr_ref` plus `pr_state`."
    agent: researcher
  - id: implement
    description: "Execute the full public acceptance path: perform kickoff opt-in with metrics enabled, run `/Users/don/Documents/plugin-hive/skills/hive/skills/meta-optimize/SKILL.md` against a test user-project fixture, and write proof artifacts such as `/Users/don/Documents/plugin-hive/.pHive/audits/mvs-proof/{iso-ts}/proof.yaml` plus `/Users/don/Documents/plugin-hive/.pHive/audits/mvs-proof/latest.yaml` that capture the PR reference, PR state, metrics references, and fixture details."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Run end-to-end validation for the public fixture path. Suggested checks: execute the live proof workflow, verify `rg -n \"pr_ref|pr_state|baseline_metrics|candidate_metrics|metrics_enabled\" /Users/don/Documents/plugin-hive/.pHive/audits/mvs-proof`, and confirm the fixture run produced a PR artifact rather than a direct commit."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review the MVS proof for milestone honesty: kickoff opt-in really happened, metrics flowed, the public skill ran end to end, the PR artifact is real, and closure succeeded with PR-shaped evidence."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the MVS proof artifacts and any supporting end-to-end test coverage once review passes."
    agent: developer
    depends_on: [review]

