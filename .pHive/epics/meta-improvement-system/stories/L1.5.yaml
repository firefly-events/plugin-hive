id: L1.5
epic: meta-improvement-system
slice: S7
title: Promotion adapter interface
status: pending
complexity: medium
methodology: classic
depends_on: ["L1.4", "A2.4"]

description: |
  Define the abstract promotion-adapter interface shared by the maintainer and
  public swarms without committing either concrete promotion path yet.
  This story gives the lifecycle library a stable seam: the maintainer loop will
  later bind a direct-commit adapter, while the public loop will bind a PR-only
  adapter, but both must satisfy one explicit contract.
  The interface must carry enough information for promotion, rollback targeting,
  and closure evidence without hard-coding direct-commit assumptions.
  Do create the interface, adapter result shape, and contract tests. Do not
  implement direct-commit or PR-only behavior in this story.

acceptance_criteria:
  - "Given the adapter-interface story, when the repo is inspected, then `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/promotion_adapter.py` exists and defines an abstract promotion contract."
  - "Given later swarm asymmetry, when the interface is reviewed, then it supports both a maintainer direct-commit path and a public PR-only path without changing the shared lifecycle API."
  - "Given closure-evidence needs, when the adapter result shape is examined, then it has an explicit place for promotion evidence and rollback targeting rather than burying those values in ad hoc fields."
  - "Given S7 scope, when this story completes, then no concrete direct-commit or PR-only adapter implementation exists yet."

steps:
  - id: research
    description: "Confirm the shared-versus-asymmetric boundary between lifecycle runtime and promotion policy from the outline, architect review, and the rewritten promotion step."
    agent: researcher
  - id: implement
    description: "Create `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/promotion_adapter.py` with an abstract adapter interface, a shared result shape, and explicit evidence/rollback fields that later concrete adapters must fill."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run interface-contract tests. Suggested checks: `pytest tests/meta_experiment/test_promotion_adapter.py` and `rg -n \"abstract|rollback|evidence|pr\" /Users/don/Documents/plugin-hive/hive/lib/meta-experiment/promotion_adapter.py`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that the shared adapter seam preserves maintainer/public asymmetry without overfitting to direct-commit evidence shape."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the promotion-adapter interface once tests and review pass."
    agent: developer
    depends_on: [review]

