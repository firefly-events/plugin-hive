  - id: implement
    description: "Create `/Users/don/Documents/plugin-hive/.pHive/meta-team/charter-meta-optimize.md` and `/Users/don/Documents/plugin-hive/.pHive/meta-team/charter-meta-meta-optimize.md` using the shared safety-constraints reference instead of copying legacy single-swarm prose."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Verify both charters exist and reference the shared safety constraints. Suggested checks: `test -f` on both charter paths and `rg -n \"meta-safety-constraints|worktree|PR-only|local-only\" /Users/don/Documents/plugin-hive/.pHive/meta-team/charter-meta-*.md`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review for swarm-specific scope clarity and confirm neither charter silently preserves the old single-swarm authority assumptions."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the new charters once shared constraints and swarm-specific scope are both clear."
    agent: developer
    depends_on: [review]

