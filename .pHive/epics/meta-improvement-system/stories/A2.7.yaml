id: A2.7
epic: meta-improvement-system
slice: S4
title: Write two new charters
status: pending
complexity: medium
methodology: classic
depends_on: ["A1.2", "A1.4", "A2.6"]

description: |
  Write the two swarm-specific charters that replace the legacy single-swarm
  charter without duplicating the shared safety-constraint prose extracted in A1.
  One charter must govern the public `meta-optimize` swarm and one must govern
  the local-only `meta-meta-optimize` maintainer swarm.
  Both charters should import or reference the shared safety constraints, then
  state swarm-specific mission, scope, promotion model, and boundary language.
  Do preserve the reusable safety and quality-bar instincts. Do not copy the old
  charter forward wholesale or keep its plugin-only scope language in the public
  swarm charter.

acceptance_criteria:
  - "Given the charter story, when `/Users/don/Documents/plugin-hive/.pHive/meta-team/` is inspected, then `charter-meta-optimize.md` and `charter-meta-meta-optimize.md` exist."
  - "Given the shared-constraints extraction from A1, when the new charters are read, then they import or reference shared safety constraints instead of duplicating the full prose."
  - "Given the two-swarm split, when the public charter is read, then it does not inherit the old plugin-internal-only scope restriction."
  - "Given the maintainer-only local tool decision, when the maintainer charter is read, then it clearly reflects local-only operation and worktree-default safety."

