description: |
  Resolve the Step 5 authority contradiction by rewriting the testing phase so
  the tester either stays genuinely read-only or uses an explicitly aligned
  orchestrator-mediated write path for persisted results.
  This story is the sharpest control-plane inconsistency in the current system:
  Step 5 says "do NOT modify any files" and "NOT available: Write access to any
  files" while also instructing the tester to append `test_results` to
  `.pHive/meta-team/cycle-state.yaml`.
  The rewrite must make the contract internally coherent and align the workflow
  step wording to the chosen persistence model.
  Do keep the structural/schema/content-safety checks. Do not defer the
  contradiction to reviewer judgment or undocumented convention.

acceptance_criteria:
  - "Given the rewritten Step 5, when the file is read top to bottom, then its rules, context boundaries, and task sequence no longer contradict each other about write access."
  - "Given the chosen persistence model, when test results are recorded, then the responsible writer is named explicitly and that writer is consistent with the control-plane grants."
  - "Given the workflow file, when the testing step block is reviewed, then its task/output wording matches the rewritten Step 5 contract."
  - "Given the original audit finding, when this story is compared against the prior Step 5 text, then the direct read-only versus append-to-cycle-state conflict is gone."

