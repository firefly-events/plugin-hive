id: C2.1
epic: meta-improvement-system
slice: S5
title: Add metrics config keys
status: pending
complexity: medium
methodology: classic
depends_on: ["C1.1", "C1.2", "C1.3", "C1.4"]

description: |
  Add the S5 config surface that gates all metrics writes: `metrics.enabled`
  defaulting to `false` and `metrics.dir` defaulting to `.pHive/metrics`.
  This story owns the config schema and documentation comments in
  `hive/hive.config.yaml`; it does not emit metrics by itself.
  The resulting config must be explicit enough that every later hook story can
  treat it as the one write-time gate and one carrier root.
  Do preserve the existing backend-routing and planning settings. Do not add
  kickoff prompting here or write any event records yet.

acceptance_criteria:
  - "Given the updated config, when `/Users/don/Documents/plugin-hive/hive/hive.config.yaml` is read, then it contains `metrics.enabled: false` and `metrics.dir: .pHive/metrics`."
  - "Given the default-off policy, when the config comments are reviewed, then they describe metrics as opt-in and do not imply background emission by default."
  - "Given S5 scope, when this story completes, then no hook or kickoff owner files have been modified."
  - "Given later emitters depend on these keys, when review finishes, then the config surface is precise enough for hook stories to gate all writes on it."

steps:
  - id: research
    description: "Confirm the exact config keys, defaults, and comment style already used in `hive/hive.config.yaml`, then map how later S5 stories will consume them."
    agent: researcher
  - id: implement
    description: "Modify `/Users/don/Documents/plugin-hive/hive/hive.config.yaml` to add `metrics.enabled: false` and `metrics.dir: .pHive/metrics` with repo-consistent documentation comments."
    agent: backend-developer
    depends_on: [research]
  - id: test
    description: "Verify the new keys and defaults exist. Suggested checks: `rg -n \"metrics:|enabled: false|dir: \\.pHive/metrics\" /Users/don/Documents/plugin-hive/hive/hive.config.yaml`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review for policy accuracy, comment clarity, and isolation from later hook and kickoff work."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the metrics config-key addition once the defaults and comments are correct."
    agent: developer
    depends_on: [review]

