id: L1.4
epic: meta-improvement-system
slice: S7
title: Delta-compare primitive
status: pending
complexity: medium
methodology: classic
depends_on: ["L1.3", "B0.2", "B0.3"]

description: |
  Implement the lifecycle-library compare primitive that turns two baseline
  snapshots into a structured decision object for later promotion logic.
  This story owns comparison only: take baseline and candidate inputs, evaluate
  them against the lean threshold policy, and emit a decision record the
  promotion layer can consume later.
  The compare output must stay simple and compatible with the B0 query contract:
  one threshold policy shape, one decision object, no per-metric class system.
  Do add fixture tests covering improvement, no-change, and regression paths.
  Do not implement a concrete promotion adapter or rollback triggering here.

acceptance_criteria:
  - "Given the compare primitive, when the repo is inspected, then `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/compare.py` exists and produces a structured decision object from two snapshots."
  - "Given fixture baseline and candidate snapshots, when tests run, then improvement, neutral, and regression scenarios are all classified deterministically."
  - "Given the lean Q3 policy, when the compare output is reviewed, then it uses one threshold-policy shape and does not introduce per-metric asymmetric classes."
  - "Given S7 scope, when this story completes, then the result is comparison output only and no promotion or close side effects occur."

