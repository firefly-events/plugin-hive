  - id: implement
    description: "Create `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/compare.py` to compare two metric snapshots, apply the lean threshold policy, and return a structured decision object for later promotion handling."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run compare fixture tests. Suggested checks: `pytest tests/meta_experiment/test_compare.py` and `rg -n \"threshold|decision\" /Users/don/Documents/plugin-hive/hive/lib/meta-experiment/compare.py`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that the compare primitive matches the B0 contract, stays lean, and leaves promotion behavior to later stories."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the compare primitive once tests and review pass."
    agent: developer
    depends_on: [review]

