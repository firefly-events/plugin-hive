id: A2.4
epic: meta-improvement-system
slice: S4
title: Rewrite promotion step with unambiguous revert semantics
status: pending
complexity: high
methodology: classic
depends_on: ["A1.2", "A1.4", "A1.5", "A2.1", "A2.3"]

description: |
  Rewrite the promotion phase so failed changes have an explicit, reversible
  disposition under the user-approved worktree isolation model.
  The current Step 7 mixes "revert", "leave the file as-is", and
  "flag for human" behaviors while still reflecting a pre-rewrite control plane.
  S4 requires this step to make the revert path unambiguous: worktree-native
  discard or equivalent delete-on-fail semantics must be stated clearly enough
  that later maintainer runs can prove reversibility instead of improvising it.
  Do preserve the distinction between promoted versus rejected work. Do not add
  PR-only public-swarm behavior here; that belongs later.

acceptance_criteria:
  - "Given the rewritten Step 7, when a maintainer reads the promotion contract, then the revert path for failed changes is explicit and compatible with worktree-default isolation."
  - "Given `pass`, `needs_optimization`, and `needs_revision` verdicts, when the step is read, then each verdict has one unambiguous action path."
  - "Given the workflow file, when the promotion block is inspected, then its task/output wording matches the rewritten Step 7 semantics."
  - "Given Q4 worktree default, when this story is reviewed, then Step 7 does not describe irreversible or ad hoc cleanup behavior as acceptable promotion logic."

