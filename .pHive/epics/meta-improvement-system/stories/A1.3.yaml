description: |
  Demote `meta-team-nightly-cycle.md` so it is clearly historical and no longer
  presents itself as the authoritative guide for the future two-swarm system.
  The useful operator narrative can remain, but the document must state up front
  that it describes a retired legacy control plane.
  The story should add a clear header or status block, keep salvageable monitoring
  ideas, and remove authoritative posture where practical. Do not delete the doc,
  because later operators may still need the historical context during migration.

acceptance_criteria:
  - "Given the demotion story, when `/Users/don/Documents/plugin-hive/hive/references/meta-team-nightly-cycle.md` is opened, then it is explicitly marked historical/operator-narrative only."
  - "Given the authority reset, when an operator scans the doc, then it no longer reads as the current source of truth for the live system."
  - "Given useful salvage remains, when the story completes, then operator-history value is preserved rather than deleting the document."

