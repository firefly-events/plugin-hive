code_examples:
  - title: "Q3-required envelope fields"
    file: /Users/don/Documents/plugin-hive/.pHive/epics/meta-improvement-system/docs/user-decisions-dd.md
    snippet: |
      - **Required fields:** approved as listed (baseline ref, candidate ref, commit/ref, metrics snapshot, policy ref, decision, `rollback_ref`, observation window, `regression_watch`).
      - **Delayed-regression handling:** `auto-revert`.
      - **Closure invariant:** agreed. Cycle cannot close unless commit/ref + metrics snapshot + rollback target are present.

design_decisions:
  - decision: "Use the C1 envelope schema as the runtime contract."
    rationale: "The lifecycle library is a consumer of the metrics substrate, not an alternate schema authority."
    source: "structured-outline Part 4 S7 | C1.3"
  - decision: "Keep updates narrow to decision and rollback state."
    rationale: "The substrate contract already limits mutable fields; the lifecycle library must not widen it."
    source: "C1.4 acceptance criteria | vertical-plan Slice 2"

cross_cutting:
  - concern: documentation
    action: "Update `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/README.md` with the envelope module contract and explicitly point readers back to `/Users/don/Documents/plugin-hive/.pHive/metrics/experiment-envelope.schema.md` as the source of record."

risks:
  - severity: medium
    description: "The runtime could quietly fork the approved schema by normalizing extra internal fields."
    mitigation: "Test the module against the exact Q3 field set and reject extra-field expansion during review."
  - severity: medium
    description: "Envelope update helpers could become a loophole for arbitrary mutation."
    mitigation: "Constrain the public API and cover mutation boundaries in tests."

