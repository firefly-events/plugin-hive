id: L1.2
epic: meta-improvement-system
slice: S7
title: Envelope loader and writer
status: pending
complexity: medium
methodology: classic
depends_on: ["L1.1", "C1.3", "C1.4"]

description: |
  Implement the lifecycle-library envelope runtime that reads and writes the
  approved experiment record shape from the C1 substrate.
  This story owns the first `meta-experiment` data primitive: load an envelope,
  create a new envelope, and perform only the narrow updates later slices need
  for decision and rollback state.
  The implementation must preserve the lean Q3 field set and stay aligned with
  the C1 envelope schema rather than inventing a richer internal model.
  Do add round-trip tests over example envelopes. Do not add baseline capture,
  compare logic, or promotion behavior in this story.

acceptance_criteria:
  - "Given the new lifecycle primitive, when the repo is inspected, then `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/envelope.py` exists and reads/writes the approved envelope shape."
  - "Given schema-aligned fixture data, when tests run, then envelope create and load round-trips preserve every Q3-approved field."
  - "Given the narrow mutation rule, when update helpers are exercised, then only decision and rollback-related fields are mutable in place."
  - "Given the anti-over-engineering constraint, when the module is reviewed, then it does not add extra envelope fields, threshold classes, or alternate rollback modes."

steps:
  - id: research
    description: "Confirm the approved envelope fields, closure invariant, and C1 envelope-writer contract from `user-decisions-dd.md`, `structured-outline.md`, and `C1.4`."
    agent: researcher
  - id: implement
    description: "Create `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/envelope.py` and any package exports needed to load, create, and narrowly update experiment envelopes against `/Users/don/Documents/plugin-hive/.pHive/metrics/experiment-envelope.schema.md`."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run round-trip envelope tests. Suggested checks: `pytest tests/meta_experiment/test_envelope.py` and `rg -n \"regression_watch|rollback_ref|policy_ref\" /Users/don/Documents/plugin-hive/hive/lib/meta-experiment/envelope.py`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review for schema fidelity, lean-field discipline, and narrow update semantics."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the envelope runtime once tests and review pass."
    agent: developer
    depends_on: [review]

