description: |
  Add the explicit backlog-fallback step surface that lets the local maintainer
  scaffold say "no metric signal; would use backlog" without running an
  experiment yet.
  This story creates or updates
  `hive/workflows/steps/meta-team-cycle/step-03b-backlog-fallback.md` as the
  reusable owner of backlog-mode behavior, and it wires the local scaffold to
  read from that step contract during dry-run execution.
  The branch must be structurally real but still non-destructive: it can load
  backlog entries and explain which candidate would be chosen, but it must not
  mutate the control plane, promote changes, or close a cycle.
  Do make the fallback step explicit and reusable. Do not turn it into a live
  experiment or metrics-comparison path in this slice.

acceptance_criteria:
  - "Given the fallback story, when the repo is inspected, then `/Users/don/Documents/plugin-hive/hive/workflows/steps/meta-team-cycle/step-03b-backlog-fallback.md` exists."
  - "Given a dry-run maintainer invocation, when no metric signal is available, then the skill can load backlog state and report backlog-fallback intent without mutating files."
  - "Given S8 intro scope, when the fallback branch is reviewed, then it is explicitly non-destructive and does not invoke promotion, close, or direct experiment execution."
  - "Given backlog auto-surfacing is deferred, when the step is read, then it assumes human-edited queues only."

