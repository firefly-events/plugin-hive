id: C1.4
epic: meta-improvement-system
slice: S2
title: Writer and reader primitives
status: pending
complexity: high
methodology: classic
depends_on: ["B0.1", "B0.2", "B0.3", "C1.2", "C1.3"]

description: |
  Implement the inert runtime primitives under `hive/lib/metrics/` that read and
  write the dual-schema carrier without introducing live emitters.
  This story owns the first real code in the metrics substrate: append-only event
  writes, envelope creation plus constrained updates, baseline reads, and delta
  comparison helpers over fixture data.
  The runtime must stay side-effect-bounded to `.pHive/metrics/` and remain callable
  without hook integration. Its job is to provide trusted I/O and comparison
  behavior for later slices, not to choose metrics, own config prompts, or wire
  workflow hooks.
  Do include unit tests for round-trip reads/writes and side-effect boundaries.
  Do not add actual event emission sites, kickoff UX changes, or lifecycle logic.

acceptance_criteria:
  - "Given the new runtime module, when the repo is inspected, then `/Users/don/Documents/plugin-hive/hive/lib/metrics/` exists with writer, reader, and compare helpers."
  - "Given fixture data, when tests run, then an event can be appended, a run-scoped range can be read back, and a structured delta can be produced."
  - "Given envelope writes, when the writer is exercised, then creation works and update-in-place is limited to decision and rollback fields."
  - "Given the side-effect boundary, when tests or review inspect the implementation, then no writes occur outside `/Users/don/Documents/plugin-hive/.pHive/metrics/`."
  - "Given later hook integration is out of scope, when this story completes, then no workflow hook or kickoff file has been modified."

steps:
