  - id: implement
    description: "Create `/Users/don/Documents/plugin-hive/hive/lib/metrics/` with append-only event writer, envelope writer, baseline reader, run-range reader, and delta-compare helpers. Keep file I/O restricted to `.pHive/metrics/` and do not wire any callers yet."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run primitive tests for round-trip writes, constrained envelope updates, fixture diff output, and side-effect boundaries. Suggested commands should include the repo’s normal test runner plus `rg -n \".pHive/metrics\" /Users/don/Documents/plugin-hive/hive/lib/metrics` to confirm path scoping."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review for schema fidelity, path-bound I/O, and accidental coupling to future hook or lifecycle concerns."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the inert runtime module once tests and review pass."
    agent: developer
    depends_on: [review]

