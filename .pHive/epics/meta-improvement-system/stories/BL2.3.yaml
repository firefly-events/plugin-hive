id: BL2.3
epic: meta-improvement-system
slice: S9
title: Integrate baseline capture, metric emission, compare, and close validation
status: pending
complexity: high
methodology: classic
depends_on: ["BL2.2", "L1.3", "L1.4", "L1.7", "C2.6"]

description: |
  Compose the shared lifecycle library and metrics substrate into the live
  maintainer path so a real run captures baseline state, emits metrics, performs
  comparison, and reaches close validation with evidence-bearing artifacts.
  This story owns the first full library composition, but not yet the deliberate
  rollback-realism proof. It should wire the maintainer orchestration to the
  baseline primitive, live metrics emission, compare output, and closure gate so
  the system can produce real envelopes and event records during a proving run.
  Because the shared close validator will later serve both direct-commit and
  PR-only paths, this integration should preserve explicit evidence shapes rather
  than collapsing them into a direct-commit-only shortcut.
  Do wire the live evidence path across the maintainer run. Do not yet claim the
  rollback-realism milestone proof artifact.

acceptance_criteria:
  - "Given the composed maintainer path, when a live run executes, then baseline capture, metric emission, comparison, and close validation all occur in one flow."
  - "Given the run artifacts, when the repo is inspected after execution, then representative envelope and event records exist under `/Users/don/Documents/plugin-hive/.pHive/metrics/`."
  - "Given the close gate, when a fabricated `commit: TBD` close attempt is exercised in tests, then the shared validator rejects it."
  - "Given the shared-validator concern, when integration code is reviewed, then evidence remains explicit enough for future PR-only close records and is not normalized to direct-commit-only assumptions."

