  - id: test
    description: "Add and run integration tests for the composed evidence path. Suggested checks: `pytest tests/meta_meta/test_live_cycle_integration.py` and `rg -n \"commit: TBD|metrics_snapshot|baseline_ref|rollback_ref\" /Users/don/Documents/plugin-hive/tests/meta_meta`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that the live maintainer path now composes the shared lifecycle library correctly and preserves explicit evidence shape for current and future close records."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the composed live evidence path once review passes."
    agent: developer
    depends_on: [review]

