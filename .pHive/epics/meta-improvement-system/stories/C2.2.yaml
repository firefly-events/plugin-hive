  - id: implement
    description: "Modify `/Users/don/Documents/plugin-hive/.claude-plugin/plugin.json` and any adjacent helper files introduced by the chosen strategy so session-end metrics emission runs alongside the existing interrupt sentinel without breaking it."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run checks for flag-off silence, flag-on story-total emission, and sentinel preservation. Suggested checks should include inspection of `.claude-plugin/plugin.json`, the chosen helper path, and a no-write/write assertion against `/Users/don/Documents/plugin-hive/.pHive/metrics/events/`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review the Stop-hook composition for blast radius, idempotency, and token-total correctness using the `C2.0` mechanism."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the Stop-hook metrics change once sentinel preservation and flag gating are proven."
    agent: developer
    depends_on: [review]

