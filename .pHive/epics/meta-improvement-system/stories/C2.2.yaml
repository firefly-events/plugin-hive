id: C2.2
epic: meta-improvement-system
slice: S5
title: Stop-hook session-end metric emission for story totals
status: pending
complexity: high
methodology: classic
depends_on: ["C2.0", "C2.1"]

description: |
  Add the session-end metrics emission path at the Stop-hook owner surface in
  `.claude-plugin/plugin.json` while preserving the existing interrupt sentinel.
  This story owns story-end totals such as wall-clock and session-level token
  totals using the D4-approved combined dispatcher shape in the existing Stop
  hook or an equivalent adjacent entry inside the same owner file if needed for
  clean isolation.
  The implementation must remain silent when `metrics.enabled` is false and must
  not let metrics failure suppress the sentinel write to `.pHive/interrupts/`.
  Do follow the token-capture mechanism chosen in `C2.0`. Do not treat token
  totals as optional or leave the hook composition under-specified.

acceptance_criteria:
  - "Given the D4 decision, when `.claude-plugin/plugin.json` is reviewed, then the Stop-hook owner surface preserves the interrupt sentinel and adds metrics dispatch with handler isolation."
  - "Given `metrics.enabled: false`, when the Stop hook fires, then no `.pHive/metrics/events/*.jsonl` write occurs."
  - "Given `metrics.enabled: true`, when the Stop hook fires, then a story-end event is emitted that includes wall-clock and token-total fields derived from the C2.0 mechanism."
  - "Given hook failure handling, when the metrics branch fails, then the interrupt sentinel still writes `.pHive/interrupts/{ts}.yaml`."

