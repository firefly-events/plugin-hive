id: C2.5
epic: meta-improvement-system
slice: S5
title: Fix-loop iteration and first-attempt pass emission at execute boundaries
status: pending
complexity: medium
methodology: classic
depends_on: ["C2.0", "C2.1"]

description: |
  Emit the quality-oriented S5 metrics at execute boundaries: fix-loop iteration
  count and first-attempt review-pass status.
  This story owns the execute-boundary surface where those two metrics are most
  naturally known, and it must write schema-valid JSONL events only when the
  metrics gate is enabled.
  The resulting events should be specific enough that later consumers can tell
  whether a story passed review on the first try and how many fix iterations it
  required.
  Do keep the implementation focused on execute-boundary emission. Do not fold
  in human escalation or token-specific logic here.

acceptance_criteria:
  - "Given `metrics.enabled: true`, when execute-boundary events occur, then fix-loop iteration counts and first-attempt pass status are emitted as schema-valid metrics events."
  - "Given `metrics.enabled: false`, when the same boundaries occur, then no metrics events are written."
  - "Given downstream consumers need binary quality signals, when the first-attempt pass event is reviewed, then it clearly distinguishes first-pass from fix-loop cases."
  - "Given S5 scope, when this story completes, then escalation and token-specific emission remain owned by their separate stories."

steps:
  - id: research
    description: "Identify the concrete execute-boundary owner surface where fix-loop count and first-attempt review-pass state are available without inference."
    agent: researcher
  - id: implement
    description: "Modify the execute-boundary owner file so fix-loop iteration count and first-attempt pass state emit schema-valid JSONL events behind the `metrics.enabled` gate."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run checks for first-pass versus fix-loop cases, schema validity, and flag-off silence using the repo’s chosen test approach."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review the event shape for binary clarity and confirm the implementation did not pull in unrelated emission responsibilities."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the execute-boundary metrics emission once the two quality metrics are proven."
    agent: developer
    depends_on: [review]

