id: K.2
epic: meta-improvement-system
slice: S6
title: Brownfield preservation and change prompt
status: pending
complexity: medium
methodology: classic
depends_on: ["K.1"]

description: |
  Preserve and expose existing `metrics.enabled` state during brownfield
  re-kickoff instead of silently resetting it.
  This story again names the kickoff owner files explicitly:
  `skills/kickoff/SKILL.md` and `hive/references/kickoff-protocol.md`.
  The flow must read the current config value, show it to the user, and offer a
  change prompt only if they want to alter it.
  Do maintain idempotent re-kickoff behavior. Do not overwrite a prior opt-in or
  opt-out just because kickoff is run again.

acceptance_criteria:
  - "Given a brownfield re-kickoff with `metrics.enabled` already set, when the flow reaches the metrics decision, then it reads and shows the existing value instead of silently resetting it."
  - "Given the user chooses to keep the existing value, when re-kickoff completes, then `hive/hive.config.yaml` remains unchanged for `metrics.enabled`."
  - "Given the user chooses to change the value, when re-kickoff completes, then `hive/hive.config.yaml` updates `metrics.enabled` to the new choice."
  - "Given the owner-file requirement, when this story is reviewed, then the brownfield logic lives in `skills/kickoff/SKILL.md` and `hive/references/kickoff-protocol.md` rather than an undocumented side path."

steps:
  - id: research
    description: "Read the current re-kickoff idempotent guards and determine exactly where the existing `metrics.enabled` value should be read, shown, and optionally updated."
    agent: researcher
  - id: implement
    description: "Modify `/Users/don/Documents/plugin-hive/skills/kickoff/SKILL.md` and `/Users/don/Documents/plugin-hive/hive/references/kickoff-protocol.md` so brownfield re-kickoff preserves or updates `metrics.enabled` based on explicit user choice."
    agent: backend-developer
    depends_on: [research]
  - id: test
    description: "Add and run brownfield re-kickoff checks proving keep-versus-change behavior for `metrics.enabled`. Suggested checks should include the repo’s chosen test command plus targeted inspection of the kickoff owner files for the preservation prompt."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review the brownfield path for idempotency, explicit choice handling, and correct file ownership."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the brownfield preservation flow once re-kickoff no longer resets `metrics.enabled` silently."
    agent: developer
    depends_on: [review]

