id: A1.5
epic: meta-improvement-system
slice: S3
title: Zero or remove active state files
status: pending
complexity: medium
methodology: classic
depends_on: ["B0.1", "B0.2", "B0.3", "A1.1"]

description: |
  Clear the active legacy state tree so no tooling or operator can mistake it
  for a coherent live control plane after archival.
  This story zeroes out or removes the active `cycle-state.yaml`, `ledger.yaml`,
  and `queue.yaml` only after their historical copies are safely archived.
  The outcome should be a clean transition state: archive preserved, active live
  files clearly absent or empty, and no half-wired authority remaining.
  Do not create the new split queue or new charters here; those belong to later
  slices. The goal is removal of stale authority, not introduction of new state.

acceptance_criteria:
  - "Given the reset story, when `/Users/don/Documents/plugin-hive/.pHive/meta-team/` is inspected, then `cycle-state.yaml`, `ledger.yaml`, and `queue.yaml` are absent or clearly zeroed so they cannot be mistaken for active authoritative state."
  - "Given the archive dependency, when this story runs, then archival copies already exist before any active-state clearing happens."
  - "Given slice boundaries, when the story completes, then no replacement queue or control-plane files have been created yet."

steps:
  - id: research
    description: "Confirm the archive outputs from A1.1 and determine whether empty-file or delete semantics is safer for the current repo conventions."
    agent: researcher
  - id: implement
    description: "Clear or remove `/Users/don/Documents/plugin-hive/.pHive/meta-team/cycle-state.yaml`, `/Users/don/Documents/plugin-hive/.pHive/meta-team/ledger.yaml`, and `/Users/don/Documents/plugin-hive/.pHive/meta-team/queue.yaml` so no stale contradictory state remains active."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Verify the three active files are absent or clearly empty and that the archive copies remain present. Suggested checks: `test ! -s` or file absence checks for active paths and `test -f` for archive copies."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that authority has been reset cleanly without damaging the preserved archive."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the active-state reset once review passes."
    agent: developer
    depends_on: [review]

