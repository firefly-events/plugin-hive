design_decisions:
  - decision: "Emit escalation metrics at the orchestrator path where escalation is explicit."
    rationale: "This friction metric should be recorded where escalation is actually decided, not inferred later."
    source: "structured-outline Part 4 S5 | user-decisions Q8"
  - decision: "Keep escalation emission behind the same default-off gate."
    rationale: "All metrics writes are opt-in at kickoff; escalation is not a special exception."
    source: "user-decisions Q-new-B | C2.1"

