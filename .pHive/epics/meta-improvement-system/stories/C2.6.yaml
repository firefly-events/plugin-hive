id: C2.6
epic: meta-improvement-system
slice: S5
title: Human escalation emission
status: pending
complexity: medium
methodology: classic
depends_on: ["C2.0", "C2.1"]

description: |
  Emit the human-escalation metric at the orchestrator escalation path so the
  final MVP metric set includes the friction signal the user explicitly wanted.
  This story owns only the escalation event path and should remain silent unless
  metrics are enabled.
  The emitted record should identify that a human escalation occurred and carry
  enough context to correlate it with run and story outcomes later.
  Do keep the implementation narrow and schema-valid. Do not mix in review-pass
  or token logic from the other S5 stories.

acceptance_criteria:
  - "Given `metrics.enabled: true`, when a human-escalation path is triggered, then a schema-valid escalation event is written to `.pHive/metrics/events/`."
  - "Given `metrics.enabled: false`, when the same escalation path runs, then no metrics event is written."
  - "Given later analysis needs, when the event payload is reviewed, then it includes enough context to correlate the escalation with the affected run or story."
  - "Given S5 scope, when this story completes, then it does not duplicate token, story-total, or fix-loop emission responsibilities."

steps:
  - id: research
    description: "Find the concrete orchestrator escalation path and confirm the minimum context the emitted human-escalation event must carry."
    agent: researcher
  - id: implement
    description: "Modify the orchestrator escalation owner file so human escalations emit schema-valid JSONL metrics events behind the `metrics.enabled` gate."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run checks for escalation-event emission, schema validity, and flag-off silence using the repo’s chosen test approach."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review the escalation payload for correlation usefulness and confirm the story stayed narrow."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the human-escalation emitter once the event shape and gating behavior are proven."
    agent: developer
    depends_on: [review]

