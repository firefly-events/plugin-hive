  obligations, workflow wording, and active-state references match the rebuilt
  authority model instead of the archived single-swarm system.
  This story owns `step-04-implementation.md` and the matching implementation
  step block in `meta-team-cycle.workflow.yaml`.
  The rewritten step must stop telling the developer to mutate legacy
  `.pHive/meta-team/cycle-state.yaml` as an inline scratchpad when that path is
  no longer the live authority mechanism for both future swarms.
  Do keep the approved-proposal sequencing, file reread discipline, and blocked
  proposal handling. Do not rewrite testing, promotion, or close semantics here.

acceptance_criteria:
  - "Given the rewritten implementation step, when an operator reads `step-04-implementation.md`, then every named write target is consistent with the post-A1 control plane rather than archived meta-team state."
  - "Given the workflow file, when the implementation step block is reviewed, then its task/output wording matches the rewritten step file and does not promise legacy `cycle-state.yaml` recording behavior."
  - "Given the archived-single-swarm reset, when the step is checked against S4 scope, then it no longer depends on live writes to `/Users/don/Documents/plugin-hive/.pHive/meta-team/cycle-state.yaml` for routine per-change tracking."
  - "Given A2 scope boundaries, when this story completes, then testing, evaluation, promotion, and close files remain untouched except for any workflow wording needed to keep Step 4 aligned."

