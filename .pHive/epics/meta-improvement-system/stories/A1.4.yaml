depends_on: ["B0.1", "B0.2", "B0.3", "A1.2"]

description: |
  Replace the legacy file-copy sandbox guidance with the authoritative
  worktree-centric isolation reference required by the signed Q4 decision.
  This story creates `meta-experiment-isolation.md`, redirects surviving
  references, and retires `meta-team-sandbox.md` from active authority.
  The new reference should explain why copy-file sandboxing is insufficient for
  experiment proof, how worktree isolation supports clean discard/revert flows,
  and what expectations later slices inherit.
  Do preserve any useful risk-routing ideas if they still fit. Do not keep the
  old file-copy procedure as if it were still the active contract.

acceptance_criteria:
  - "Given the replacement story, when `/Users/don/Documents/plugin-hive/hive/references/meta-experiment-isolation.md` is opened, then worktree isolation is documented as the authoritative model."
  - "Given the old sandbox ref, when repo references are checked, then live cross-links to `meta-team-sandbox.md` have been removed or redirected."
  - "Given the signed isolation decision, when the new doc is reviewed, then it does not present file-copy sandboxing as an acceptable default."

