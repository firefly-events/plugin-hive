title: Meta-optimize backlog template
status: pending
complexity: low
methodology: classic
depends_on: ["BL2i.1"]

description: |
  Create the consumer backlog template that the future shipped `/meta-optimize`
  path will use when metrics are unavailable or insufficient.
  This story is intentionally light: the file should exist, explain its shape,
  and remain empty so the public skill can start from a clean template rather
  than inheriting maintainer-specific proving-run candidates.
  The template should mirror the backlog vocabulary established for the local
  maintainer queue where appropriate, but it must remain consumer-facing and
  neutral about repo-internal proving steps.
  Do create the template and explain how it is meant to be populated. Do not add
  consumer execution logic or seed maintainer candidates into it.

acceptance_criteria:
  - "Given the template story, when the repo is inspected, then `/Users/don/Documents/plugin-hive/.pHive/meta-team/queue-meta-optimize.yaml` exists."
  - "Given the consumer template requirement, when the file is read, then it documents the expected entry shape but starts empty."
  - "Given public and maintainer swarms differ, when the template is reviewed, then it contains no maintainer-only proving-run candidates or worktree-specific assumptions."

