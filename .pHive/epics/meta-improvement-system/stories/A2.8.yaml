id: A2.8
epic: meta-improvement-system
slice: S4
title: Audit step-write obligations against team grants
status: pending
complexity: high
methodology: classic
depends_on: ["A2.2", "A2.3", "A2.4", "A2.5", "A2.6", "A2.7"]

description: |
  Add the closure-property audit that proves the rewritten control plane is
  internally coherent: every path a step may write is covered by the responsible
  swarm’s team grants, and no step requires an unauthorized mutation.
  This story is the S4 proof point, not a narrative summary. It should produce
  mechanical evidence in the repo’s normal test location or an equivalent audit
  artifact that can fail when steps and grants drift apart.
  Do inspect the workflow and rewritten step files against both new team YAMLs.
  Do not accept prose-only confidence or reviewer intuition as the proof.

acceptance_criteria:
  - "Given the S4 rewrite set, when the closure-property audit runs, then every declared step-write path is a subset of the corresponding swarm’s team grants."
  - "Given a missing or over-broad mapping, when the audit is exercised, then it fails with a specific path-to-grant mismatch."
  - "Given the rewritten control plane, when this story completes, then the repo contains a durable audit artifact or test that future changes can rerun."
  - "Given S4 verification requirements, when review finishes, then Step 5 contradiction removal and Step 8 incomplete-close rejection are both still covered by the final proof surface."

steps:
  - id: research
    description: "Enumerate every declared write target in the rewritten workflow and Steps 4-8, then map each one to the responsible swarm file and grant before choosing the audit implementation shape."
    agent: researcher
  - id: implement
    description: "Add the closure-property audit in the repo’s normal test location or equivalent audit artifact so rewritten steps, workflow files, and team YAMLs can be checked mechanically for grant coverage."
    agent: tester
    depends_on: [research]
  - id: test
    description: "Run the closure-property audit and record any intentional negative cases proving it fails on mismatched paths. Suggested checks should include the repo’s chosen test command plus `rg -n \"step-0[4-8]|meta-optimize|meta-meta-optimize\" /Users/don/Documents/plugin-hive/.pHive/teams /Users/don/Documents/plugin-hive/hive/workflows`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review the audit for real proof value rather than documentation theater, and confirm the path coverage matches the final rewritten control plane."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the closure-property audit once it proves step writes are a subset of team grants."
    agent: developer
    depends_on: [review]

