id: C2.0
epic: meta-improvement-system
slice: S5
title: Token capture feasibility spike
status: pending
complexity: high
methodology: classic
depends_on: ["C1.4"]

description: |
  Identify and prove the viable token-capture mechanism that S5 will use for MVP
  metrics emission. This story is mandatory and blocking, not optional research.
  The user’s D7 directive is explicit: token capture is required for S5 MVP and
  "there has to be a way."
  Investigate the concrete candidate surfaces named in the locked decision:
  Claude Code JSONL transcripts under `~/.claude/projects/*/`, PostToolUse hook
  environment variables, SessionEnd hook context, and background Agent task
  output JSONL under `/private/tmp/claude-*/.../tasks/*.output` where `usage`
  blocks may contain `input_tokens` and `output_tokens`.
  The deliverable is a documented mechanism plus proof-of-concept extraction of
  token counts for at least one real past session. If every candidate fails, the
  story fails and S5 is blocked.

acceptance_criteria:
  - "Given the D7 requirement, when the spike completes, then it identifies one viable extraction path for token counts and documents why that path is the chosen mechanism."
  - "Given the candidate surfaces, when the spike is reviewed, then Claude Code transcripts, PostToolUse env vars, SessionEnd context, and background Agent task output JSONL were all investigated or explicitly ruled out with evidence."
  - "Given the proof-of-concept requirement, when the spike artifacts are inspected, then token counts were extracted from at least one real past session rather than a synthetic fixture."
  - "Given follow-on S5 stories depend on this result, when the spike completes successfully, then the chosen mechanism is specific enough that later hook stories can write token counts to JSONL."
  - "Given the user’s directive, when no viable mechanism is found, then this story is marked failed and the remaining metric-emission stories do not proceed."

steps:
  - id: research
    description: "Investigate the four named candidate surfaces for token visibility, gather evidence from real local artifacts, and determine which one can support S5 MVP token capture."
    agent: researcher
  - id: implement
    description: "Create `/Users/don/Documents/plugin-hive/.pHive/epics/meta-improvement-system/docs/token-capture-feasibility.md` plus a proof artifact at `/Users/don/Documents/plugin-hive/.pHive/epics/meta-improvement-system/docs/token-capture-proof.json` documenting the viable extraction mechanism and real-session proof-of-concept counts."
    agent: researcher
    depends_on: [research]
  - id: test
    description: "Verify the feasibility doc names all candidate surfaces and the proof artifact contains extracted token counts from real session data. Suggested checks: `rg -n \"~/.claude/projects|PostToolUse|SessionEnd|/private/tmp/claude-|usage|input_tokens|output_tokens\" /Users/don/Documents/plugin-hive/.pHive/epics/meta-improvement-system/docs/token-capture-feasibility.md` and inspect `/Users/don/Documents/plugin-hive/.pHive/epics/meta-improvement-system/docs/token-capture-proof.json` for non-empty counts."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review the spike for real evidence quality and confirm the chosen mechanism is concrete enough to unblock token-emission stories."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the spike artifacts only if a viable extraction path was identified and exercised against real session data."
    agent: developer
    depends_on: [review]

