id: A2.5
epic: meta-improvement-system
slice: S4
title: Rewrite close step and add closure validator
status: pending
complexity: high
methodology: classic
depends_on: ["B0.1", "B0.3", "A1.2", "A1.5", "A2.4"]

description: |
  Rewrite the close phase and add the non-bypassable closure validator that the
  user signed off on in Q3.
  This story owns the close-step contract, the workflow wording tied to close,
  and the first explicit validator surface that rejects incomplete closes before
  any ledger append can happen.
  The validator must require real commit/ref evidence, a persisted metrics
  snapshot reference, and a rollback target. A fabricated `commit: TBD` style
  close must fail.
  Do keep the morning-summary and ledger responsibilities. Do not water down the
  invariant into a warning, reviewer suggestion, or manual checklist.

acceptance_criteria:
  - "Given the rewritten Step 8, when the close contract is read, then commit/ref, metrics snapshot, and rollback target are mandatory preconditions for successful close."
  - "Given an incomplete close attempt, when the closure validator is exercised or described in the step, then the close is rejected before ledger append."
  - "Given the workflow file, when the close step block is reviewed, then its task/output wording matches the rewritten Step 8 and validator semantics."
  - "Given the historical `commit: TBD` integrity break, when this story is reviewed, then the new close contract clearly rejects fabricated commit evidence."

