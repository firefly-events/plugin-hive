description: |
  Finish the public ship by documenting `/meta-optimize` for end users and
  maintainers who need to support the shipped flow.
  The docs must explain the real operating model the implementation now enforces:
  metrics are opted in at kickoff and default off, backlog fallback exists for
  insufficient signal, the public swarm targets user projects, and retained
  changes leave as PR-style artifacts rather than direct mutations.
  This story is intentionally lightweight relative to the runtime work; it
  should consolidate the shipped behavior into the repo’s user-facing surfaces
  instead of restating design discussions or internal planning docs.
  Do update public docs and configuration references for the shipped command. Do
  not document maintainer-only `/meta-meta-optimize` behavior as part of the
  public user surface.

acceptance_criteria:
  - "Given `/meta-optimize` is now shipped, when public docs are read, then users can find the command, its prerequisites, and its PR-only operating model."
  - "Given S6, when kickoff-related docs are read, then they clearly explain metrics opt-in, default-off behavior, and backlog fallback when metrics are unavailable."
  - "Given the public/local split, when ship docs are reviewed, then `/meta-meta-optimize` remains described as maintainer-local rather than a shipped user command."
  - "Given the MVS fixture proof exists, when docs mention expected outputs, then they describe PR artifacts and baseline-vs-candidate metrics rather than commit-based promotion."

