id: K.1
epic: meta-improvement-system
slice: S6
title: Fresh-workspace metrics opt-in question
status: pending
complexity: medium
methodology: classic
depends_on: ["C2.1", "C2.2", "C2.3", "C2.4", "C2.5", "C2.6"]

description: |
  Add the fresh-workspace kickoff question that exposes the signed metrics opt-in
  choice before any user-facing meta skill exists.
  This story explicitly names the kickoff owner files: `skills/kickoff/SKILL.md`
  and `hive/references/kickoff-protocol.md`.
  The question must make the trade-off clear, default to no, and route the
  chosen value to `metrics.enabled` in `hive/hive.config.yaml`.
  Do present this as a meaningful choice with clear consequences. Do not reset
  existing values here; brownfield preservation belongs to `K.2`.

acceptance_criteria:
  - "Given a fresh kickoff, when the user reaches the metrics decision, then the flow asks \"Enable metrics tracking?\" or equivalent with clear trade-off explanation and default-off semantics."
  - "Given the user’s answer, when kickoff persists config, then `hive/hive.config.yaml` records the value under `metrics.enabled`."
  - "Given the owner-file constraint, when this story is reviewed, then the question and copy are anchored in `skills/kickoff/SKILL.md` and `hive/references/kickoff-protocol.md`."
  - "Given S6 scope, when this story completes, then brownfield re-kickoff preservation is still left to `K.2`."

steps:
  - id: research
    description: "Read the current kickoff delegation pattern and confirm where the fresh-workspace elicitation copy and config-persistence steps belong in the two kickoff owner files."
    agent: researcher
  - id: implement
    description: "Modify `/Users/don/Documents/plugin-hive/skills/kickoff/SKILL.md` and `/Users/don/Documents/plugin-hive/hive/references/kickoff-protocol.md` so fresh kickoff asks the metrics opt-in question and writes the answer to `metrics.enabled`."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run fresh-kickoff checks proving the question appears and the selected value is written to `hive/hive.config.yaml`. Suggested checks should include the repo’s chosen test command plus `rg -n \"Enable metrics tracking|metrics.enabled\" /Users/don/Documents/plugin-hive/skills/kickoff/SKILL.md /Users/don/Documents/plugin-hive/hive/references/kickoff-protocol.md`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review the wording for policy accuracy, default-off semantics, and correct ownership between the kickoff skill and protocol."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the fresh-kickoff opt-in question once copy and config persistence are correct."
    agent: developer
    depends_on: [review]

