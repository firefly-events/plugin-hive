  - id: implement
    description: "Create `/Users/don/Documents/plugin-hive/.pHive/epics/meta-improvement-system/docs/b0-consumer-contract.md` with the envelope field outline, purpose notes, and consumer mapping. Do not add syntax-level schema or implementation details."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Verify the doc contains every approved field and no extras. Suggested checks: `rg -n \"baseline_ref|candidate_ref|policy_ref|rollback_ref|regression_watch\" /Users/don/Documents/plugin-hive/.pHive/epics/meta-improvement-system/docs/b0-consumer-contract.md` and `rg -n \"per-metric|human-confirmed|recommendation-only\" /Users/don/Documents/plugin-hive/.pHive/epics/meta-improvement-system/docs/b0-consumer-contract.md`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review for drift against Q3 and confirm the field outline is sufficient input for S2 schema authoring."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the contract-doc change once review passes."
    agent: developer
    depends_on: [review]

