description: |
  Define the approved experiment-envelope field set as a contract document before
  Epic C freezes any storage schema. This story is documentation-only and should
  not add runtime code, config keys, or writer behavior.
  The deliverable is the first section of `b0-consumer-contract.md`: field names,
  shapes, purpose, and who consumes each field.
  The content must preserve the user’s Q3 “do not over-engineer” constraint:
  use only the approved lean field set and avoid threshold subclasses, extra
  closure evidence, or rollback branches.
  Do include clear type/purpose notes and where the lifecycle library or query
  surface will later read the field. Do not invent syntax-level schema details.

acceptance_criteria:
  - "Given the Q3 sign-off, when the contract doc is read in isolation, then it enumerates every approved envelope field with purpose and data shape."
  - "Given the contract doc, when an architect checks it against Epic C planning, then baseline_ref, candidate_ref, commit/ref, metrics snapshot, policy_ref, decision, rollback_ref, observation window, and regression_watch are all present."
  - "Given the user’s anti-over-engineering direction, when the field outline is reviewed, then no per-metric threshold classes, alternate rollback modes, or extra envelope fields appear."
  - "Given this is B0 contract work, when the story completes, then no runtime code, hooks, or config changes were introduced."

