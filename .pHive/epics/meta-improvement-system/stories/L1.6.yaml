    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run rollback-watch tests covering trigger and non-trigger cases. Suggested checks: `pytest tests/meta_experiment/test_rollback_watch.py` and `rg -n \"auto-revert|callback|observation\" /Users/don/Documents/plugin-hive/hive/lib/meta-experiment/rollback_watch.py`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that rollback handling stays single-path, evidence-bearing, and ready for real end-to-end activation in S9 without needing interface changes."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the rollback-watch primitive once tests and review pass."
    agent: developer
    depends_on: [review]

