id: L1.6
epic: meta-improvement-system
slice: S7
title: Rollback watch and auto-revert trigger
status: pending
complexity: high
methodology: classic
depends_on: ["L1.4", "L1.5", "B0.3"]

description: |
  Implement the shared rollback-watch primitive that observes post-promotion
  metrics and invokes one auto-revert callback path when a regression exceeds
  threshold.
  This story owns the lifecycle-library observation-window logic and callback
  contract only. It should detect threshold-exceeding regression, produce a
  trigger event for the envelope/proof path, and call a supplied auto-revert
  function with the rollback target and supporting evidence.
  The user’s Q3 direction is strict here: no alternate rollback modes, no
  human-confirmed branch, and no recommendation-only result.
  Do add tests covering watch-window timing, non-trigger cases, and callback
  firing on real fixture regressions. Do not yet bind the callback to a concrete
  direct-commit adapter; that lands in S9.

acceptance_criteria:
  - "Given the rollback-watch story, when the repo is inspected, then `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/rollback_watch.py` exists and models observation-window evaluation plus auto-revert callback firing."
  - "Given a threshold-exceeding fixture regression during the observation window, when tests run, then the rollback watch emits a trigger record and invokes the provided auto-revert callback."
  - "Given a non-regression or below-threshold change, when tests run, then the callback is not invoked."
  - "Given the user’s Q3 decision, when the module is reviewed, then it contains one behavior only: auto-revert on triggered regression, with no manual or recommendation-only branch."

