id: BL3.4
epic: meta-improvement-system
slice: S10
title: Unknown-dimension tolerance in metric registry
status: pending
complexity: medium
methodology: classic
depends_on: ["K.3", "BL2.6", "BL3.3", "C1.4"]

description: |
  Harden the public metrics-consumption path so consumer-supplied metric
  dimensions that were not pre-declared by plugin-hive do not crash the skill,
  registry helpers, or comparison flow.
  This is a public-ship robustness story rather than a schema expansion story:
  the system should tolerate unknown dimensions, preserve known data, and keep
  producing usable comparisons instead of failing on user-project variation.
  The tolerance mechanism must remain compatible with the lean metrics carrier
  and should not introduce a new class system, schema explosion, or bespoke
  public-only metric format.
  Do implement tolerant parsing and comparison behavior for unknown dimensions.
  Do not redesign the carrier or widen MVP scope beyond graceful handling.

acceptance_criteria:
  - "Given a consumer project with metric dimensions not pre-declared in plugin-hive, when `/meta-optimize` reads them, then the registry path does not crash."
  - "Given mixed known and unknown dimensions, when comparison output is generated, then known dimensions still compare correctly and unknown ones are surfaced or ignored deterministically."
  - "Given Q3's anti-over-engineering constraint, when this story completes, then no new threshold-class system or public-only schema fork has been added."
  - "Given S10 verification needs, when tests run, then unknown-dimension fixtures exercise the public metrics path end to end enough to prove tolerance."

