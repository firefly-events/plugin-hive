  - id: implement
    description: "Modify the relevant metrics-registry and compare path used by `/Users/don/Documents/plugin-hive/skills/hive/skills/meta-optimize/` so unknown consumer dimensions are handled gracefully without changing the lean carrier contract."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run tolerance coverage. Suggested checks: `pytest tests/meta_optimize/test_metric_registry_unknown_dimensions.py`, verify fixtures with extra dimensions do not fail the run, and grep for the handling path with `rg -n \"unknown|dimension|tolerate|ignore\" /Users/don/Documents/plugin-hive/skills/hive/skills/meta-optimize /Users/don/Documents/plugin-hive/hive/lib`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that the solution is robust but still lean: no schema sprawl, no public-only metric fork, and no crash on consumer variance."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the unknown-dimension tolerance changes once tests and review pass."
    agent: developer
    depends_on: [review]

