id: B0.2
epic: meta-improvement-system
slice: S1
title: Query shape doc for baseline vs candidate, run-over-run, and delayed-regression watch
status: pending
complexity: medium
methodology: classic
depends_on: ["B0.1"]

description: |
  Extend the B0 contract with the three consumer query shapes Epic B expects:
  baseline-vs-candidate, run-over-run, and delayed-regression-watch.
  This story explains what each query reads, what answer it returns, and whether
  the query is expected to be cheap, moderate, or expensive on the future carrier.
  The purpose is to keep C1 schema work grounded in actual reader needs instead
  of guessed telemetry. Do not add implementations or APIs here.
  Do include the minimum fields each query must join across and what lifecycle
  decision each query supports. Do not redesign the slice order or add extra
  analytics asks beyond the approved B0 contract.

acceptance_criteria:
  - "Given the B0 contract doc, when the query section is reviewed, then baseline-vs-candidate, run-over-run, and delayed-regression-watch are all named and described."
  - "Given each named query, when a reader checks the contract, then required inputs, intended output, and cost expectation are stated explicitly."
  - "Given the S2 dependency, when an architect reads the query section alone, then it is clear what records the metrics substrate must support."
  - "Given the contract-first scope, when the story lands, then no schema files, runtime code, or hook behavior changed."

