    description: "The event schema could omit provenance or context fields needed by later emitters."
    mitigation: "Use the horizontal-plan field list exactly and include example rows for each major context type."
  - severity: low
    description: "Event and envelope concerns could get mixed together."
    mitigation: "Keep mutation rules and rollback semantics out of this doc; reserve them for C1.3."

