design_decisions:
  - decision: "Keep event storage append-only JSONL."
    rationale: "The carrier is designed for low-friction event emission and later range reads keyed by run."
    source: "horizontal-plan L3 | vertical-plan Slice 2"
  - decision: "Separate event rows from experiment-envelope records."
    rationale: "The approved dual-schema model explicitly splits sparse events from mutable experiment state."
    source: "user-decisions Q1"

cross_cutting:
  - concern: documentation
    action: "Create `/Users/don/Documents/plugin-hive/.pHive/metrics/metrics-event.schema.md` and cross-link it from the carrier README so hook and lifecycle stories have a single event-schema reference."

risks:
