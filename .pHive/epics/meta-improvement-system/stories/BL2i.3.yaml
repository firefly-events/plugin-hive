description: |
  Create the local-only `/meta-meta-optimize` skill scaffold at
  `maintainer-skills/meta-meta-optimize/SKILL.md`, outside the shipped skill
  root and outside `.claude-plugin/plugin.json`.
  This story makes the packaging boundary structural: the maintainer skill lives
  in the repo, can document its shared-library dependency, and can describe the
  dry-run/backlog-loading flow, but it must not yet perform real experiments.
  The scaffold may include helper docs or prompt fragments under the same local
  path if needed, but the new root path is the core deliverable.
  Do create the skill scaffold and keep it local-only. Do not register it in the
  plugin manifest or add destructive execution behavior yet.

