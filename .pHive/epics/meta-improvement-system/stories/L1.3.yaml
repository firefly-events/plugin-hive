    description: "The primitive could assume metrics are always present and make backlog-mode runs impossible."
    mitigation: "Add no-metrics fixture coverage and require an explicit no-baseline return shape."
  - severity: low
    description: "Baseline capture could start deciding experiment outcomes instead of just collecting references."
    mitigation: "Keep comparison logic in `compare.py` and review the module boundary."

