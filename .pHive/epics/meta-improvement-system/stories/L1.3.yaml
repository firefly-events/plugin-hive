id: L1.3
epic: meta-improvement-system
slice: S7
title: Baseline-capture primitive
status: pending
complexity: medium
methodology: classic
depends_on: ["L1.2", "C1.4", "C2.1"]

description: |
  Implement baseline capture in the shared lifecycle library so later swarms can
  persist a baseline snapshot reference into the experiment envelope.
  This story bridges the lifecycle module to the inert metrics substrate without
  wiring any workflow or skill caller yet: it should resolve the correct metrics
  directory, read baseline data, and write a stable snapshot reference into the
  envelope record.
  The primitive must tolerate metrics being disabled or sparse, because backlog
  fallback remains a valid mode later in the epic.
  Do cover the enabled and no-metrics paths in tests. Do not make promotion or
  compare decisions in this story.

acceptance_criteria:
  - "Given the baseline primitive, when the repo is inspected, then `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/baseline.py` exists and can persist a baseline snapshot reference into an envelope."
  - "Given fixture metrics data, when tests run, then the primitive reads the substrate and records a stable baseline reference."
  - "Given metrics may be disabled or absent, when baseline capture is called without usable events, then the result is an explicit no-baseline outcome rather than a crash."
  - "Given S7 is library work, when this story completes, then no workflow step file or skill prompt was changed."

steps:
  - id: research
    description: "Confirm the baseline-capture responsibilities and the default-off metrics behavior from the outline, `user-decisions-dd.md`, and the C1 primitive contract."
    agent: researcher
  - id: implement
    description: "Create `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/baseline.py` so the shared lifecycle library can read substrate data, derive a baseline snapshot reference, and persist that reference back through the envelope helper."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run baseline fixture tests for both metrics-present and no-metrics cases. Suggested checks: `pytest tests/meta_experiment/test_baseline.py` and `rg -n \"baseline\" /Users/don/Documents/plugin-hive/hive/lib/meta-experiment/baseline.py`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that baseline capture remains a substrate-facing primitive, preserves backlog-mode tolerance, and does not embed skill or workflow assumptions."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the baseline primitive once tests and review pass."
    agent: developer
    depends_on: [review]

