    rationale: "Metrics are opt-in and backlog fallback remains valid, so missing baseline evidence must not crash the library."
    source: "user-decisions Q-new-B | Q7 extension"
  - decision: "Persist snapshot references through the shared envelope helper."
    rationale: "The envelope remains the canonical record joining baseline state to later compare and close behavior."
    source: "vertical-plan Slice 7"

