id: A2.3
epic: meta-improvement-system
slice: S4
title: Rewrite evaluation step
status: pending
complexity: medium
methodology: classic
depends_on: ["A1.2", "A1.5", "A2.1"]

description: |
  Rewrite the evaluation phase so reviewer obligations, quality-bar inputs, and
  any persisted evaluation results line up with the rebuilt two-swarm control
  plane instead of the archived single-team contract.
  The current Step 6 reads from `.pHive/meta-team/charter.md` and writes
  evaluations back into `.pHive/meta-team/cycle-state.yaml`, even though the
  future control plane replaces the one-charter model and must not assume the
  archived active-state files remain the live authority surface.
  Do preserve the pass / needs_optimization / needs_revision decision logic and
  evidence-oriented review bar. Do not redesign promotion or closure behavior.

acceptance_criteria:
  - "Given the rewritten Step 6, when a reviewer reads the file, then its charter references and persistence targets match the new swarm-specific control plane rather than the archived single charter."
  - "Given the evaluation verdict model, when the step is reviewed, then `pass`, `needs_optimization`, and `needs_revision` remain explicit and evidence-driven."
  - "Given the workflow file, when the evaluation step block is inspected, then its task/output wording matches the Step 6 rewrite."
  - "Given S4 scope, when this story completes, then promotion and close semantics are not redefined here."

steps:
  - id: research
    description: "Read the current Step 6 contract, the one-charter assumptions it makes, and the S4 outline language for reviewer-aligned writes before rewriting the step."
    agent: researcher
  - id: implement
    description: "Rewrite `/Users/don/Documents/plugin-hive/hive/workflows/steps/meta-team-cycle/step-06-evaluation.md` and align the evaluation block in `/Users/don/Documents/plugin-hive/hive/workflows/meta-team-cycle.workflow.yaml` to the rebuilt control plane."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Verify the rewritten Step 6 no longer depends on the archived single-charter model and still preserves the verdict taxonomy. Suggested checks: `rg -n \"pass \\| needs_optimization \\| needs_revision|charter|cycle-state.yaml\" /Users/don/Documents/plugin-hive/hive/workflows/steps/meta-team-cycle/step-06-evaluation.md`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review for reviewer-role coherence, preserved quality-bar rigor, and correct separation from promotion and close concerns."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the Step 6 rewrite once the evaluation contract matches the new control plane."
    agent: developer
    depends_on: [review]

