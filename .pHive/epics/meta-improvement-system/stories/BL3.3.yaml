    action: "Keep `/Users/don/Documents/plugin-hive/skills/hive/skills/meta-optimize/SKILL.md` explicit about target-project inputs, metrics opt-in dependency, and backlog-template fallback so users can run the public skill without maintainer-only assumptions."

