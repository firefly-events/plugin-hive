design_decisions:
  - decision: "Keep public orchestration as a consumer of the rewritten workflow and shared lifecycle library."
    rationale: "S10 is supposed to ship the same control plane and lifecycle semantics proven in S9, not fork them in public-skill code."
    source: "vertical-plan Slice 10 | A2.8 | S7"
  - decision: "Read kickoff metrics state as a real prerequisite rather than a doc-only note."
    rationale: "The MVS acceptance path begins at kickoff opt-in, so the public skill has to consume that state explicitly."
    source: "structured-outline S10 acceptance criteria | user-decisions Q-new-B"

cross_cutting:
