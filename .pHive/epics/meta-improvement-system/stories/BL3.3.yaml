id: BL3.3
epic: meta-improvement-system
slice: S10
title: Public-skill orchestration against user-project targets
status: pending
complexity: high
methodology: classic
depends_on: ["K.3", "BL2.6", "BL3.1", "BL3.2", "A2.8", "L1.3", "L1.4", "L1.7", "BL2i.2"]

description: |
  Wire the shipped `/meta-optimize` skill to the rewritten control plane and the
  shared lifecycle library so it can execute against a user-project target.
  This is the public orchestration story: the skill must load target inputs,
  honor metrics opt-in state from kickoff, consume the consumer backlog template
  when needed, and run through baseline capture, candidate execution, compare,
  promotion, and close using the public PR-only adapter.
  The orchestration must preserve the control-plane grants and step obligations
  established in S4 rather than embedding ad hoc behavior in the skill file.
  Do bind the public skill to the A2 workflow and shared runtime. Do not bypass
  the lifecycle library or restore legacy meta-team authority shortcuts.

acceptance_criteria:
  - "Given the public skill story, when `/meta-optimize` is invoked against a user-project target, then it routes through the rewritten A2 workflow and shared lifecycle helpers rather than bespoke inline logic."
  - "Given the S6 dependency, when metrics were enabled at kickoff, then the public run reads that state and enables metrics-backed operation instead of ignoring kickoff configuration."
  - "Given consumer backlog support, when metrics are insufficient, then the orchestration can load the consumer `queue-meta-optimize.yaml` template rather than failing before proposal selection."
  - "Given the shared close gate, when the public orchestration completes a valid run, then it supplies PR-shaped closure evidence that the validator accepts."

