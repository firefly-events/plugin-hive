id: BL3.5
epic: meta-improvement-system
slice: S10
title: Backlog-fallback mode for consumer backlog template
status: pending
complexity: medium
methodology: classic
depends_on: ["K.3", "BL2.6", "BL3.3", "BL2i.2", "BL2i.4"]

description: |
  Integrate backlog-fallback behavior into the public `/meta-optimize` flow so
  consumer projects can supply curated improvement candidates when metrics alone
  are insufficient to propose a change.
  This story adapts the backlog-mode concept proven for the maintainer side to
  the public consumer template, but it must stay within the signed MVP scope:
  the backlog is human-edit-only and no auto-surfacing pipeline is introduced.
  The public skill should explain when backlog fallback is used, where consumers
  populate `queue-meta-optimize.yaml`, and how the selected candidate still runs
  through baseline capture, compare, PR promotion, and closure the same way as
  a metrics-proposed experiment.
  Do wire backlog fallback into the public path and template semantics. Do not
  add auto-generated backlog items or new qualitative-ingestion machinery.

acceptance_criteria:
  - "Given insufficient metrics signal, when `/meta-optimize` runs with a populated consumer backlog template, then it can select a candidate from `queue-meta-optimize.yaml` instead of idling."
  - "Given Q-new-D, when the backlog integration is reviewed, then it remains human-edit-only and includes no auto-surfacing logic."
  - "Given public-user clarity needs, when the template and skill docs are read, then they explain what fields consumers populate and when backlog fallback applies."
  - "Given shared lifecycle integrity, when a backlog-driven public run proceeds, then it still flows through baseline capture, compare, PR-only promotion, and close validation."

