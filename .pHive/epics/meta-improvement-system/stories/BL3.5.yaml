  - id: implement
    description: "Modify `/Users/don/Documents/plugin-hive/skills/hive/skills/meta-optimize/SKILL.md`, `/Users/don/Documents/plugin-hive/.pHive/meta-team/queue-meta-optimize.yaml`, and any helper code so the public path can load consumer-curated backlog entries when metric-driven proposal selection is unavailable."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run backlog-fallback coverage. Suggested checks: `pytest tests/meta_optimize/test_backlog_fallback.py`, `rg -n \"queue-meta-optimize|backlog|human-edit|auto-surfacing\" /Users/don/Documents/plugin-hive/skills/hive/skills/meta-optimize /Users/don/Documents/plugin-hive/.pHive/meta-team/queue-meta-optimize.yaml`, and verify a backlog-driven run still reaches the shared lifecycle path."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that the consumer backlog path is human-curated, understandable to users, and behaviorally aligned with the shared lifecycle rather than a sidecar shortcut."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the public backlog-fallback integration once tests and review pass."
    agent: developer
    depends_on: [review]

