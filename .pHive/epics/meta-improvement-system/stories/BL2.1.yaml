id: BL2.1
epic: meta-improvement-system
slice: S9
title: Direct-commit promotion adapter
status: pending
complexity: high
methodology: classic
depends_on: ["L1.5", "A2.4", "BL2i.3"]

description: |
  Implement the first concrete promotion adapter for the local maintainer loop:
  a direct-commit path that operates inside a worktree and returns explicit
  promotion evidence to the shared lifecycle library.
  This story owns concrete promotion mechanics only for `/meta-meta-optimize`.
  It must take the shared promotion-adapter contract from S7 and bind it to a
  local direct-commit workflow that can report commit hashes, rollback targets,
  and discard-on-failure behavior without affecting the public PR-only path.
  The adapter must be worktree-native by default and produce evidence in a shape
  the closure validator can consume later in the slice.
  Do implement concrete maintainer promotion behavior and failure cleanup. Do
  not wire the full skill orchestration or proof artifact yet.

acceptance_criteria:
  - "Given the direct-commit adapter story, when the repo is inspected, then a concrete maintainer adapter exists under `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/`."
  - "Given a worktree-scoped experiment candidate, when the adapter promotes it, then it returns a real commit hash plus rollback target information."
  - "Given a failed promotion, when tests run, then the adapter discards worktree residue and reports failure without leaving partial promotion state in the main tree."
  - "Given shared-library boundaries, when this story completes, then the implementation is maintainer-specific but still conforms to the shared adapter interface."

steps:
  - id: research
    description: "Confirm the direct-commit maintainer semantics, worktree default, and shared adapter contract from the signed decisions, S7, and the rewritten promotion step."
    agent: researcher
  - id: implement
    description: "Create a concrete maintainer direct-commit adapter under `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/` that promotes from a worktree, returns commit and rollback evidence, and cleans up on failure."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run direct-commit adapter tests. Suggested checks: `pytest tests/meta_meta/test_direct_commit_adapter.py` and `rg -n \"worktree|rollback|commit\" /Users/don/Documents/plugin-hive/hive/lib/meta-experiment`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that the adapter is truly maintainer-local, worktree-safe, and still aligned with the shared promotion interface."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the direct-commit adapter once tests and review pass."
    agent: developer
    depends_on: [review]

