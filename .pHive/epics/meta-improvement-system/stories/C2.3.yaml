id: C2.3
epic: meta-improvement-system
slice: S5
title: Per-agent token capture path
status: pending
complexity: high
methodology: classic
depends_on: ["C2.0", "C2.1", "C2.2"]

description: |
  Implement the per-agent token capture path using the mechanism proven in
  `C2.0`, and wire it into the relevant hook surface so token counts can be
  written as schema-valid JSONL metrics events.
  This story owns the agent-granular refinement of the token metric, not the
  config gate or the top-level Stop-hook totals.
  The implementation may touch PostToolUse, SessionEnd-adjacent logic, or task
  output parsing helpers depending on what the spike proved viable, but it must
  stay faithful to that decision record and degrade gracefully when a specific
  event lacks token data.
  Do write actual token counts when available. Do not re-open whether token
  capture is required or swap in a placeholder metric.

acceptance_criteria:
  - "Given the `C2.0` mechanism choice, when the per-agent token path is reviewed, then it uses that mechanism rather than inventing a new unproven surface."
  - "Given `metrics.enabled: true`, when an agent-scoped capture point fires, then the system emits token-count data that validates against the event schema."
  - "Given incomplete token visibility for a single event, when the path degrades, then it does not crash the workflow and records the absence in the documented way."
  - "Given `metrics.enabled: false`, when the same path fires, then no metrics event is written."

steps:
  - id: research
    description: "Translate the `C2.0` spike result into concrete hook/helper ownership, then confirm which repo surface should own per-agent token extraction and how graceful degradation should be represented."
    agent: researcher
  - id: implement
    description: "Modify the concrete hook/helper files selected by the `C2.0` spike so per-agent token counts can be extracted and written as schema-valid events under the `metrics.enabled` gate."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run checks for agent-scoped token emission, graceful degradation, and flag-off silence. Suggested commands should include the repo’s chosen test runner plus schema-focused inspection of emitted token events."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review the implementation for fidelity to the spike result and confirm it emits real token counts rather than placeholders."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the per-agent token-capture path once it is proven against the documented mechanism and event schema."
    agent: developer
    depends_on: [review]

