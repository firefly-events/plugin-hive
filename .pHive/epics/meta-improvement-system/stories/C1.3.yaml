id: C1.3
epic: meta-improvement-system
slice: S2
title: Experiment envelope schema
status: pending
complexity: medium
methodology: classic
depends_on: ["B0.1", "B0.2", "B0.3", "C1.1"]

description: |
  Author the lean experiment-envelope schema document that turns the B0 contract
  into a concrete storage-facing reference for `.pHive/metrics/experiments/`.
  This story captures the approved fields, how they are stored, and which
  fields are allowed to change in place after experiment creation.
  The schema must preserve the user’s Q3 guardrails: minimal field set, simple
  threshold policy reference, unconditional auto-revert semantics, and a strict
  closure invariant.
  Do include example envelopes and mutation notes. Do not add any threshold
  class system, alternative delayed-regression modes, or extra closure evidence.

acceptance_criteria:
  - "Given the envelope schema doc, when it is compared to B0 and Q3, then all approved fields are present and no extra fields were introduced."
  - "Given the mutation rules, when the schema is reviewed, then update-in-place is limited to decision and rollback-related fields rather than arbitrary envelope edits."
  - "Given the closure invariant, when the doc is read in isolation, then commit/ref, metrics snapshot, and rollback target requirements are explicit."
  - "Given the example envelope, when later slices use it as a model, then compare and rollback-watch flows can identify where policy_ref, observation_window, and regression_watch live."

steps:
  - id: research
    description: "Reconcile the B0 envelope contract with Q3 and the horizontal-plan field list before writing the storage-facing schema."
    agent: researcher
  - id: implement
    description: "Create `/Users/don/Documents/plugin-hive/.pHive/metrics/experiment-envelope.schema.md` with field definitions, example envelopes, and narrow mutation rules."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Verify the schema doc includes the approved fields and update-in-place rules. Suggested checks: `rg -n \"baseline_ref|candidate_ref|policy_ref|rollback_ref|regression_watch|update-in-place\" /Users/don/Documents/plugin-hive/.pHive/metrics/experiment-envelope.schema.md`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review for Q3 drift and confirm the doc stays lean enough for the user’s anti-over-engineering requirement."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the envelope schema after review approval."
    agent: developer
    depends_on: [review]

