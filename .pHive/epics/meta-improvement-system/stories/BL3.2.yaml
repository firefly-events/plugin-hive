    source: "vertical-plan Slice 10 | L1.5"
  - decision: "Treat `pr_ref` plus `pr_state` as first-class closure evidence."
    rationale: "S10 closure proof is PR-shaped, and the architect escalation explicitly warns against direct-commit overfitting."
