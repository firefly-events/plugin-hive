title: PR-artifact promotion adapter
status: pending
complexity: high
methodology: classic
depends_on: ["K.3", "BL2.6", "BL3.1", "L1.5", "L1.7", "A2.4"]

description: |
  Implement the public swarm’s concrete promotion adapter that produces PR-style
  artifacts instead of directly mutating the target repository.
  This story is where the public path becomes materially different from the
  maintainer path: the shared lifecycle still promotes through one adapter seam,
  but the returned evidence shape is `pr_ref` plus `pr_state`, not `commit_ref`.
  The adapter must preserve rollback targeting and closure integrity while
  keeping direct-commit semantics out of the public promotion path.
  Do implement the concrete PR adapter, result shape, and contract tests. Do not
  silently coerce PR outcomes into commit-shaped closure evidence.

acceptance_criteria:
  - "Given Q5, when the public promotion adapter is exercised, then retained changes are emitted as a PR-style artifact and not as a direct repo mutation."
  - "Given the closure-evidence-shape escalation, when the adapter result is inspected, then it carries `pr_ref` and `pr_state` for closure evidence rather than overloading `commit_ref`."
  - "Given shared rollback semantics, when the adapter output is reviewed, then rollback targeting remains explicit even on the PR-only path."
  - "Given the library seam from L1.5, when tests run, then the concrete PR adapter satisfies the shared promotion-adapter interface without changing the interface contract."

