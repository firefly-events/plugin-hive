  - id: research
    description: "Confirm the public promotion semantics, PR evidence shape, and rollback-target expectations from Q5, the S10 outline, and the closure-evidence-shape escalation."
    agent: researcher
  - id: implement
    description: "Create a concrete PR-only promotion adapter such as `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/pr_promotion_adapter.py` and bind its result shape to explicit `pr_ref`, `pr_state`, and rollback-target fields without introducing direct-commit fallback."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run adapter contract tests. Suggested checks: `pytest tests/meta_optimize/test_pr_promotion_adapter.py tests/meta_experiment/test_promotion_adapter.py tests/meta_experiment/test_closure_validator.py` and `rg -n \"pr_ref|pr_state|rollback|commit_ref\" /Users/don/Documents/plugin-hive/hive/lib/meta-experiment/pr_promotion_adapter.py`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that the concrete adapter preserves the shared lifecycle seam, emits PR-shaped closure evidence, and leaves no direct-mutation path available to the public skill."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the PR-artifact adapter and its tests once review passes."
    agent: developer
    depends_on: [review]

