id: BL2.6
epic: meta-improvement-system
slice: S9
title: Real commit-then-revert proof during observation window
status: pending
complexity: high
methodology: classic
depends_on: ["BL2.4", "BL2.5", "L1.6", "L1.7"]

description: |
  Execute the milestone rollback-realism proof for the local maintainer loop by
  committing a real, deliberately regressive change inside the worktree-isolated
  experiment path and letting the live rollback-watch stack revert it.
  This story is the explicit MVL integrity gate. It must prove that the system
  can observe a real committed regression, have `regression_watch` detect that
  regression during the observation window, pass through the genuine
  `regression_watch -> closure gate -> auto-revert` path, and emit a durable
  proof artifact that shows what happened and when.
  Manual revert, mock callbacks, synthetic closure events, and narrative-only
  evidence are all out of bounds here. The proof is valid only if the real
  committed delta triggers the real automatic path end to end.
  Do execute an end-to-end validation with a deliberate threshold-exceeding
  regression and capture the proof artifact. Do not substitute manual cleanup or
  a synthetic trigger for the real revert path.

acceptance_criteria:
  - "Experiment commits a deliberate regression to a tracked metric (threshold-exceeding degradation)"
  - "`regression_watch` MUST trigger the auto-revert path during the observation window"
  - "Auto-revert MUST fire via the lifecycle library's `regression_watch` → closure gate → auto-revert code path — NOT via manual intervention, mock, or synthetic closure"
  - "MVL proof artifact at `.pHive/audits/mvl-proof/{iso-ts}/proof.yaml` records: trigger event, auto-revert commit hash, wall-clock, confirmation that `regression_watch` fired the revert"
  - "Test step must exercise the auto-revert mechanism with a real committed delta, not a mock"
  - "Given the closure-integrity requirement, when the proof run is inspected, then the close record also carries a real metrics snapshot reference and rollback target reference."

steps:
  - id: research
    description: "Select the deliberate regression mechanism, confirm the tracked metric and threshold that will exceed, and define the exact proof-artifact fields needed to demonstrate the real auto-revert path."
    agent: researcher
  - id: implement
    description: "Execute the real committed experiment inside the maintainer worktree, introduce the deliberate threshold-exceeding regression, allow the live `regression_watch` path to trigger the automatic revert, and write `/Users/don/Documents/plugin-hive/.pHive/audits/mvl-proof/{iso-ts}/proof.yaml` plus `/Users/don/Documents/plugin-hive/.pHive/audits/mvl-proof/latest.yaml`."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Run end-to-end validation against the real committed delta. Suggested checks: execute the live proof workflow, verify the proof artifact with `rg -n \"trigger_event|auto_revert_commit|wall_clock|regression_watch_fired\" /Users/don/Documents/plugin-hive/.pHive/audits/mvl-proof`, and confirm the regressive commit was reverted by the automatic path rather than by manual cleanup."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review the proof for milestone honesty: verify that the regression was real, the revert was automatic, the path was `regression_watch -> closure gate -> auto-revert`, and the artifact evidence is durable and specific."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the rollback-realism proof artifacts and any supporting test updates once review passes."
    agent: developer
    depends_on: [review]

