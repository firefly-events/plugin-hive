    description: "The proof could be invalidated by a manual revert, a mocked callback, or a synthetic close event that only looks like the real path."
    mitigation: "Keep those paths explicitly out of scope, require end-to-end execution on a real committed delta, and review the artifact evidence against the acceptance criteria verbatim."
  - severity: high
    description: "The deliberate regression could fail to exceed threshold and produce an ambiguous non-trigger."
    mitigation: "Define the tracked metric and threshold-exceeding degradation during research, then verify the trigger event in the proof artifact."
  - severity: medium
