id: A2.6
epic: meta-improvement-system
slice: S4
title: Split meta-team team file into two swarm-specific team files
status: pending
complexity: high
methodology: classic
depends_on: ["A2.2", "A2.3", "A2.4", "A2.5"]

description: |
  Replace the single `.pHive/teams/meta-team.yaml` authority model with two
  swarm-specific team files whose grants match the rewritten step obligations.
  This story is not a net-new discovery of a missing file: `.pHive/teams/meta-team.yaml`
  already exists and must be retired or archived in favor of
  `meta-optimize.yaml` and `meta-meta-optimize.yaml`.
  The resulting grants must be explicit enough for the later closure-property
  audit to prove that every declared write path is authorized and that no
  single-swarm assumptions remain live.
  Do preserve the execution-split backends already materialized in
  `hive/hive.config.yaml`. Do not re-open backend routing here.

acceptance_criteria:
  - "Given the rewritten control plane, when `/Users/don/Documents/plugin-hive/.pHive/teams/` is inspected, then `meta-optimize.yaml` and `meta-meta-optimize.yaml` exist and the old `meta-team.yaml` is retired or clearly non-authoritative."
  - "Given the rewritten steps, when the new team files are read, then their grants cover the actual write obligations and do not include unrelated broad write access."
  - "Given the two-swarm split, when the team files are reviewed, then one file is scoped to user-project optimization and the other to plugin-hive maintenance."
  - "Given Q-new-C is already materialized, when this story completes, then it does not introduce new backend-mapping work in `hive/hive.config.yaml`."

steps:
  - id: research
    description: "Map every step-write obligation from the rewritten Step 4-8 files to the minimum needed team grants, then separate plugin-hive versus user-project responsibilities before editing team YAML."
    agent: researcher
  - id: implement
    description: "Retire `/Users/don/Documents/plugin-hive/.pHive/teams/meta-team.yaml` as the active team definition and create `/Users/don/Documents/plugin-hive/.pHive/teams/meta-optimize.yaml` plus `/Users/don/Documents/plugin-hive/.pHive/teams/meta-meta-optimize.yaml` with grants aligned to S4."
    agent: backend-developer
    depends_on: [research]
  - id: test
    description: "Verify the new team files exist and that no single-swarm assumptions remain active. Suggested checks: `test -f /Users/don/Documents/plugin-hive/.pHive/teams/meta-optimize.yaml`, `test -f /Users/don/Documents/plugin-hive/.pHive/teams/meta-meta-optimize.yaml`, and `rg -n \"meta-team|team_memory_path|domain\" /Users/don/Documents/plugin-hive/.pHive/teams`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review the grant model for minimum necessary scope and confirm it matches the rewritten step obligations without reopening backend-routing decisions."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the team-file split once the two swarm definitions and retirement handling for `meta-team.yaml` are coherent."
    agent: developer
    depends_on: [review]

