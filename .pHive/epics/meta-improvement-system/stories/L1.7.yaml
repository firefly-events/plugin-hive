id: L1.7
epic: meta-improvement-system
slice: S7
title: Closure validator and library test suite
status: pending
complexity: high
methodology: classic
depends_on: ["L1.2", "L1.3", "L1.4", "L1.5", "L1.6", "A2.5"]

description: |
  Implement the non-bypassable closure validator for the shared lifecycle
  library and finish the first full unit-test sweep for the S7 module.
  This story is where the library’s integrity contract becomes real: closure
  must reject incomplete experiment records before ledger append, with distinct
  failures for missing commit or ref evidence, missing metrics snapshot, and
  missing rollback target.
  Because S9 proves the direct-commit path first but S10 will later close with
  PR-only evidence, the validator must be written carefully enough that it does
  not overfit the shared contract to direct commits alone.
  Do add tests for the three required failure modes and at least one forward-
  looking PR-shaped close record. Do not bind the validator to a concrete skill
  or promotion adapter in this story.

acceptance_criteria:
  - "Given the closure-validator story, when the repo is inspected, then `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/closure_validator.py` exists and enforces non-bypassable close validation."
  - "Given incomplete envelopes, when tests run, then missing commit-or-ref evidence, missing metrics snapshot, and missing rollback target each fail with distinct validator errors."
  - "Given the future public path, when a PR-shaped close fixture is evaluated, then the shared validator accepts the evidence shape when the corresponding ref fields are present."
  - "Given S7 scope, when this story completes, then validation is library-local and no workflow step or skill wiring has been added."

