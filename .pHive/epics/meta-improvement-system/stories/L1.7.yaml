    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run validator tests. Suggested checks: `pytest tests/meta_experiment/test_closure_validator.py` and `rg -n \"rollback|metrics_snapshot|pr_ref|commit\" /Users/don/Documents/plugin-hive/hive/lib/meta-experiment/closure_validator.py`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that closure validation is non-bypassable, distinguishes the three required failure modes, and does not overfit the shared contract to direct-commit evidence only."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the closure validator and S7 test sweep once review passes."
    agent: developer
    depends_on: [review]

