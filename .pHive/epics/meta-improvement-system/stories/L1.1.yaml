title: "Scaffold `hive/lib/meta-experiment/`"
status: pending
complexity: medium
methodology: classic
depends_on: ["C1.3", "C1.4"]

description: |
  Create the shared lifecycle library root at `hive/lib/meta-experiment/` as a
  real runtime module rather than a skill surface.
  This story establishes the importable module layout, the module README, and a
  thin public entrypoint that later stories can extend with envelope, baseline,
  compare, promotion-adapter, rollback-watch, and closure-validator primitives.
  The point is to make the `hive/lib/` convention concrete before any maintainer
  or public skill binds to it.
  Do create the library directory, package markers, and discovery docs. Do not
  implement experiment policy, skill prompts, or a concrete promotion path here.

acceptance_criteria:
  - "Given the shared-library location decision, when the repo is inspected, then `/Users/don/Documents/plugin-hive/hive/lib/meta-experiment/` exists and is not modeled as a `SKILL.md`."
  - "Given the scaffold story, when a maintainer reads the module root, then the README explains the library purpose, future submodules, and the `hive/lib/` convention."
  - "Given later slices depend on a reusable runtime, when an import smoke test runs, then the module root is importable without pulling in skill-only paths."
  - "Given S7 is shared-runtime work, when this story completes, then no `maintainer-skills/`, `skills/`, or workflow step files have been modified."

