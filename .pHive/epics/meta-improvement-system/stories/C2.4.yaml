id: C2.4
epic: meta-improvement-system
slice: S5
title: Agent-spawn reporting emission
status: pending
complexity: medium
methodology: classic
depends_on: ["C2.0", "C2.1"]

description: |
  Emit agent-spawn reporting events so S5 captures spawn-scoped metric context
  without requiring later slices to infer it indirectly from story totals.
  This story owns the concrete agent-spawn reporting surface identified in the
  outline and must write schema-valid JSONL events only when metrics are
  enabled.
  The emitted records should provide the dimensions needed to correlate spawn
  activity with token, duration, and review outcomes in later analysis.
  Do preserve no-op behavior when metrics are disabled. Do not duplicate the
  Stop-hook totals or the fix-loop/review boundary events owned by other stories.

acceptance_criteria:
  - "Given the chosen spawn-reporting surface, when an agent spawn occurs and `metrics.enabled` is true, then a schema-valid metrics event is written."
  - "Given `metrics.enabled: false`, when the same spawn path runs, then no metrics event is written."
  - "Given later analysis needs, when the emitted event is reviewed, then it carries enough run/story/spawn context to correlate with the other MVP metrics."
  - "Given S5 scope, when this story completes, then it does not duplicate story-total or fix-loop-specific emission behavior."

steps:
  - id: research
    description: "Confirm the exact agent-spawn reporting owner surface and the minimum event dimensions needed to correlate spawn activity with the rest of S5 metrics."
    agent: researcher
  - id: implement
    description: "Modify the concrete agent-spawn reporting surface so it emits schema-valid JSONL events behind the `metrics.enabled` gate."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Add and run checks for spawn-event emission, schema validity, and flag-off silence using the repo’s chosen test approach."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review the spawn-event payload for overlap minimization and correlation usefulness across the MVP metric set."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the spawn-reporting emission once schema validity and gating behavior are proven."
    agent: developer
    depends_on: [review]

