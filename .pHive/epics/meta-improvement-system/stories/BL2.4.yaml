id: BL2.4
epic: meta-improvement-system
slice: S9
title: Activate rollback watch on a real committed experiment
status: pending
complexity: high
methodology: classic
depends_on: ["BL2.1", "BL2.3", "L1.6"]

description: |
  Bind the shared rollback-watch primitive to the concrete maintainer promotion
  path so a real committed experiment can enter the observation window and
  become eligible for automatic revert.
  This story is the activation step between pure composition and milestone proof:
  the committed experiment path, regression-watch evaluation, and concrete
  auto-revert callback must all be wired together so later proof work exercises
  the genuine path rather than a mock or bypass.
  The implementation should record trigger-relevant evidence in the live
  envelope or adjacent artifacts so the later MVL proof story can point at real
  trigger data.
  Do activate the real rollback-watch path on committed experiments. Do not yet
  claim the proof artifact or deliberate-regression demonstration.

acceptance_criteria:
  - "Given a real committed maintainer experiment, when the observation window opens, then `regression_watch` is active on that run."
  - "Given the activated path, when tests inspect the live wiring, then rollback watch invokes the concrete auto-revert callback rather than a stub or no-op."
  - "Given later proof needs, when the experiment envelope or adjacent artifacts are inspected, then trigger-relevant rollback-watch evidence is recorded for that live run."
  - "Given S9 sequencing, when this story completes, then the real path is armed but the deliberate-regression proof remains for BL2.6."

