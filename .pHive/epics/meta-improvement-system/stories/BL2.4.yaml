  - id: test
    description: "Add and run activation tests. Suggested checks: `pytest tests/meta_meta/test_rollback_watch_activation.py` and `rg -n \"regression_watch|auto_revert|observation_window\" /Users/don/Documents/plugin-hive`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that the live path is genuinely armed and that later proof work will exercise the real callback path rather than a test-only shortcut."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the rollback-watch activation once review passes."
    agent: developer
    depends_on: [review]

