id: A1.1
epic: meta-improvement-system
slice: S3
title: Archive cycle-state, ledger, and queue under dated archive path with manifest
status: pending
complexity: medium
methodology: classic
depends_on: ["B0.1", "B0.2", "B0.3"]

description: |
  Preserve the legacy meta-team state files under a dated archive path so the
  historical record survives while active authority is reset.
  This story moves the current `cycle-state.yaml`, `ledger.yaml`, and `queue.yaml`
  into `.pHive/meta-team/archive/2026-04-19/` and creates a `MANIFEST.md` that
  explains what was archived, why it was archived, and what integrity caveats
  remain in the preserved history.
  The archive must preserve file contents as evidence rather than rewriting them.
  Do create a clear manifest and include the known `commit: TBD` caveat. Do not
  silently edit the archived historical payloads to make them look cleaner.

acceptance_criteria:
  - "Given the archive story, when the archive directory is inspected, then `cycle-state.yaml`, `ledger.yaml`, `queue.yaml`, and `MANIFEST.md` exist under `/Users/don/Documents/plugin-hive/.pHive/meta-team/archive/2026-04-19/`."
  - "Given the manifest, when an operator reads it, then it explains archive scope, rationale, and the historical integrity caveat."
  - "Given the preservation requirement, when archived files are compared to their prior live versions, then they were copied for evidence rather than rewritten."
  - "Given A1 scope, when the story completes, then the old authority surface is archived but no new control-plane files were introduced yet."

