  - id: test
    description: "Verify the archive files and manifest exist. Suggested checks: `test -f` on the four archive paths and `rg -n \"commit: TBD|integrity\" /Users/don/Documents/plugin-hive/.pHive/meta-team/archive/2026-04-19/MANIFEST.md`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review that evidence was preserved, authority was severed, and the manifest does not rewrite the historical record."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the archive + manifest once review passes."
    agent: developer
    depends_on: [review]

