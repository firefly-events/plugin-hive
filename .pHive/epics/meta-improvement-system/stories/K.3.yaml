  - id: implement
    description: "Modify `/Users/don/Documents/plugin-hive/skills/kickoff/SKILL.md` and `/Users/don/Documents/plugin-hive/hive/references/kickoff-protocol.md` to explain backlog-fallback-only mode when metrics are disabled."
    agent: developer
    depends_on: [research]
  - id: test
    description: "Verify the docs mention backlog-fallback-only mode and keep default-off semantics intact. Suggested checks: `rg -n \"backlog|fallback|metrics|default\" /Users/don/Documents/plugin-hive/skills/kickoff/SKILL.md /Users/don/Documents/plugin-hive/hive/references/kickoff-protocol.md`."
    agent: tester
    depends_on: [implement]
  - id: review
    description: "Review the doc wording for policy accuracy and confirm it does not promise more capability than S6 actually delivers."
    agent: reviewer
    depends_on: [test]
  - id: integrate
    description: "Commit and push the kickoff doc update once backlog-fallback implications are explicit and accurate."
    agent: developer
    depends_on: [review]

