id: K.3
epic: meta-improvement-system
slice: S6
title: Kickoff docs update for backlog-fallback mode
status: pending
complexity: low
methodology: classic
depends_on: ["K.1", "K.2"]

description: |
  Update the kickoff-facing documentation so users understand the consequence of
  opting out of metrics: future meta runs remain in backlog-fallback-only mode
  rather than metric-driven optimization.
  This story explicitly names the kickoff owner docs: `skills/kickoff/SKILL.md`
  and `hive/references/kickoff-protocol.md`.
  The wording must be policy-accurate and should not oversell metric-driven
  capabilities before later meta-optimize slices land.
  Do make the trade-off discoverable in the kickoff docs. Do not add new config
  logic or re-open the kickoff questions themselves.

acceptance_criteria:
  - "Given the kickoff docs, when a user reads the metrics opt-in section, then they are told that opting out leaves future meta runs in backlog-fallback-only mode."
  - "Given the user’s signed decision, when the docs are reviewed, then they explain why metrics opt-in matters without implying metrics are enabled by default."
  - "Given the owner-file requirement, when this story completes, then the relevant explanatory text exists in both `skills/kickoff/SKILL.md` and `hive/references/kickoff-protocol.md`."
  - "Given S6 scope, when this story completes, then it changes documentation only and does not alter config-persistence logic."

