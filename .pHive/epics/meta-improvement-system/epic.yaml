name: meta-improvement-system
title: Meta-Improvement System — Karpathy-style auto-improvement loop for plugin-hive
description: |
  Rebuild the meta-team control plane into a measurable, Karpathy-style auto-improvement
  loop with two sibling swarms: /meta-optimize (shipped, public, user projects) and
  /meta-meta-optimize (local-only, plugin-hive internals). Epic delivers metrics
  instrumentation, control-plane rewrite, shared lifecycle library, meta-backlog,
  and both swarm skills across 10 slices.

