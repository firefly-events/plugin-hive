# public cycle needs a backlog fallback candidate.
# MVP boundary: human-edit-only. This template does not support automatic
# backlog discovery, automatic backlog population, or qualitative-ingestion
# machinery.
#
# Consumer neutrality: backlog entries describe consumer-project work only.
# Keep candidates PR-friendly, small, reversible, and scoped to one project.
# Avoid maintainer-only proving tasks, broad cleanup campaigns, or speculative
# refactors.
#
# Expected fields per entry:
# - id: stable unique identifier for the backlog item
# - title: short human-readable name for the candidate
# - description: what the change should do; `rationale` may be used instead
# - rationale: optional explanation when `description` is omitted
# - status: `pending`, `in_progress`, or `done`
# - priority: optional manual hint for humans; current MVP selection still uses
#   first `pending` entry in listed order
