# Purpose: proving-run input when metrics are absent or insufficient.
# Editing guidance: maintainers EDIT this file manually. Only add candidates
# that are trivial, reversible, and safe for a first live cycle. Destructive
# or wide-scope changes belong in a planning epic, not this backlog.
#
# Proving-run discipline: prefer ADD-style edits (append a line, add a note)
# to dormant / archived files. ADD-style edits on dormant targets produce a
# deterministic diff regardless of current file state, so they cannot silently
# become no-ops. Avoid "normalize" / "fix trailing whitespace" candidates
# unless the issue has been manually verified at the file under the candidate's
# exact target path — otherwise the proving cycle may produce an empty diff
# and fail to exercise the control plane.
#
# Active-file caution: do NOT target files that are being edited in open
# branches or recent commits. Check `git log --since="1 week" -- <path>` before
# seeding a candidate. If the target is actively churning, either wait or
# pick a dormant alternative.

