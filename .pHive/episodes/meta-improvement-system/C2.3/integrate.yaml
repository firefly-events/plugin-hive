relationship_to_c22: >
  C2.2 emits one aggregated session-total row at Stop-hook time.
  C2.3 emits per-agent rows when called by the orchestrator at natural
  agent boundaries. The two are complementary: C2.2 gives rollup view,
  C2.3 gives granular attribution. C2.3 does NOT duplicate C2.2's emission.
