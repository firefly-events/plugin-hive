name: meta-team-cycle
description: >
  Autonomous nightly self-improvement cycle for the Hive plugin codebase.
  Runs unattended at 3 AM CDT. Analyzes, proposes, implements, and promotes
  targeted improvements within the constraints defined in the meta-team charter.
version: "1.0.0"

steps:
  - id: boot
    agent: orchestrator
    task: >
      Initialize the meta-team cycle. Load the charter, previous ledger state,
      and any staged work from a prior incomplete cycle.
    step_file: hive/workflows/steps/meta-team-cycle/step-01-boot.md
    outputs:
      - name: cycle_id
        type: string
      - name: prior_ledger
        type: json
      - name: boot_report
        type: string

  - id: analysis
    agent: researcher
    task: >
      Analyze the Hive codebase for improvement opportunities: missing files,
      broken cross-references, incomplete schemas, gaps in agent memories, and
      clarity issues in step files.
    step_file: hive/workflows/steps/meta-team-cycle/step-02-analysis.md
    depends_on:
      - boot
    inputs:
      - name: cycle_id
        source: step_output
        step_id: boot
        output_name: cycle_id
      - name: target_project
        source: context
        context_key: target_project
    outputs:
      - name: findings
        type: json
      - name: analysis_report
        type: string

  - id: external-research
    agent: researcher
    # ADDITIVE-ONLY CONTRACT: this step always emits an
    # `external_research_candidates` list (empty list on provider/network
    # failure, sanitizer refusal, or zero qualifying candidates). See
    # `step-02b-external-research.md` FAILURE MODES for the guaranteed-output
    # contract. Because of that guarantee, downstream steps that declare
    # external-research as a predecessor never block on its failure — they
    # just see an empty list and continue with internal-audit proposals only.
    task: >
      Query external sources for candidate improvement proposals that complement
      the internal audit without replacing it. Feed externally sourced
      candidates into the proposal ranking queue. Always emit
      external_research_candidates, even if the list is empty.
    step_file: hive/workflows/steps/meta-team-cycle/step-02b-external-research.md
    depends_on:
      - analysis
    inputs:
      - name: cycle_id
        source: step_output
        step_id: boot
        output_name: cycle_id
      - name: findings
        source: step_output
        step_id: analysis
        output_name: findings
    outputs:
      - name: external_research_candidates
        type: json
      - name: research_summary
        type: string

  - id: proposal
    agent: architect
    task: >
      Review analysis findings and external research candidates, then produce a
      ranked proposal list. Each proposal includes rationale, risk level, and
      an implementation plan within charter constraints.
    step_file: hive/workflows/steps/meta-team-cycle/step-03-proposal.md
    depends_on:
      - analysis
      - external-research
    inputs:
      - name: findings
        source: step_output
        step_id: analysis
        output_name: findings
      - name: external_research_candidates
        source: step_output
        step_id: external-research
        output_name: external_research_candidates
    outputs:
      - name: approved_proposals
        type: json
      - name: skipped_proposals
        type: json

  - id: implementation
    agent: developer
    task: >
      Implement each approved proposal in sequence. Write files, add sections,
      create memories. Return structured per-change entries in the
      `changes_made` output; persistent control-plane writes happen in later
      steps and are coordinated by the workflow output graph, not this step.
    step_file: hive/workflows/steps/meta-team-cycle/step-04-implementation.md
    depends_on:
      - proposal
    inputs:
      - name: approved_proposals
        source: step_output
        step_id: proposal
        output_name: approved_proposals
    outputs:
      - name: changes_made
        type: json
      - name: implementation_report
        type: string

  - id: testing
    agent: tester
    task: >
      Validate every change from Step 4 using the prescribed check set
      (cross-reference integrity, schema compliance, content safety).
      Read-only — return structured test_results and a validation_report
      via the workflow output graph. Persistent control-plane writes
      happen in later steps; this step does not write files.
    step_file: hive/workflows/steps/meta-team-cycle/step-05-testing.md
    depends_on:
      - implementation
    inputs:
      - name: changes_made
        source: step_output
        step_id: implementation
        output_name: changes_made
    outputs:
      - name: test_results
        type: json
      - name: validation_report
        type: string

  - id: evaluation
    agent: reviewer
    task: >
      Evaluate each implemented change against the A1.2 shared safety-constraints
      reference (hive/references/meta-safety-constraints.md) plus the active
      swarm's charter. Assign pass / needs_optimization / needs_revision per
      change with evidence-cited rationale. Read-only — return evaluation_results
      and verdict via the workflow output graph; no file writes from this step.
    step_file: hive/workflows/steps/meta-team-cycle/step-06-evaluation.md
    depends_on:
      - testing
    inputs:
      - name: changes_made
        source: step_output
        step_id: implementation
        output_name: changes_made
      - name: test_results
        source: step_output
        step_id: testing
        output_name: test_results
    outputs:
      - name: evaluation_results
        type: json
      - name: verdict
        type: string

  - id: promotion
    agent: orchestrator
    task: >
      Apply evaluation verdicts unambiguously under the worktree-default
      isolation model (Q4 / hive/references/meta-experiment-isolation.md):
      pass and needs_optimization promote via the active swarm's adapter;
      needs_revision discards the experiment worktree. Return promoted_changes
      and reverted_changes via the workflow output graph; no inline cycle-state
      writes. Stage any reusable insights under .pHive/insights/{swarm}/.
    step_file: hive/workflows/steps/meta-team-cycle/step-07-promotion.md
    depends_on:
      - evaluation
    inputs:
      - name: evaluation_results
        source: step_output
        step_id: evaluation
        output_name: evaluation_results
    outputs:
      - name: promoted_changes
        type: json
      - name: reverted_changes
        type: json

  - id: close
    agent: orchestrator
    task: >
      Close the cycle. The closure invariant (commit_ref + metrics_snapshot +
      rollback_ref all present and valid) is a non-bypassable gate per B0 §1.11
      and user-decisions Q3 — incomplete closes are rejected before ledger
      append. On pass, update cycle-state, commit changes, append ledger entry,
      and produce morning summary. On fail, record close_rejected output with
      missing-field details and halt without ledger append.
    step_file: hive/workflows/steps/meta-team-cycle/step-08-close.md
    depends_on:
      - promotion
    inputs:
      - name: cycle_id
        source: step_output
        step_id: boot
        output_name: cycle_id
      - name: promoted_changes
        source: step_output
        step_id: promotion
        output_name: promoted_changes
      - name: reverted_changes
        source: step_output
        step_id: promotion
        output_name: reverted_changes
    outputs:
      - name: morning_summary
        type: string
      - name: close_rejected
        type: string
        optional: true
